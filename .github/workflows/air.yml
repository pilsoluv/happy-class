name: Update Air Quality

on:
  schedule:
    - cron: "*/5 * * * *"   # GitHub Actions 최소 5분
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: 에어코리아 API 호출 및 조건 처리
        shell: bash
        run: |
          NOW_HOUR=$(TZ=Asia/Seoul date +%H | sed 's/^0//')
          NOW_MIN=$(TZ=Asia/Seoul date +%M | sed 's/^0//')
          [ -z "$NOW_MIN" ] && NOW_MIN=0

          # 기존 데이터 읽기
          if [ -f air.json ]; then
            LAST_HOUR=$(jq -r '.dataHour // empty' air.json)
          else
            LAST_HOUR=""
          fi

          echo "현재 시각(서울): ${NOW_HOUR}시 ${NOW_MIN}분"
          echo "마지막 저장 dataHour: ${LAST_HOUR}"

          # 감시 구간 판정
          # 11시는 00~30분까지 적극 감시
          # 그 외 시간은 00~20분 사이만 감시
          SHOULD_FETCH="false"

          if [ "$NOW_HOUR" -eq 11 ]; then
            if [ "$NOW_MIN" -le 30 ]; then
              SHOULD_FETCH="true"
            fi
          else
            if [ "$NOW_MIN" -le 20 ]; then
              SHOULD_FETCH="true"
            fi
          fi

          # 이미 이번 시간 데이터가 있으면 굳이 다시 안 받음
          if [ "$LAST_HOUR" = "$NOW_HOUR" ]; then
            echo "이미 ${NOW_HOUR}시 데이터가 있음 → 종료"
            exit 0
          fi

          if [ "$SHOULD_FETCH" != "true" ]; then
            echo "지금은 감시 구간 아님 → 종료"
            exit 0
          fi

          curl -s -o air_raw.json "https://apis.data.go.kr/B552584/ArpltnInforInqireSvc/getMsrstnAcctoRltmMesureDnsty?serviceKey=${{ secrets.AIR_KEY }}&returnType=json&numOfRows=1&pageNo=1&stationName=%EA%B3%A0%ED%98%84%EB%8F%99&dataTerm=DAILY&ver=1.3"

          PM10=$(jq -r '.response.body.items[0].pm10Value' air_raw.json)
          PM25=$(jq -r '.response.body.items[0].pm25Value' air_raw.json)
          DATATIME=$(jq -r '.response.body.items[0].dataTime' air_raw.json)

          # dataTime에서 시(hour)만 추출
          DATA_HOUR=$(echo "$DATATIME" | grep -o '[0-9]\+시' | sed 's/시//')

          echo "API dataTime: $DATATIME"
          echo "API dataHour: $DATA_HOUR"
          echo "PM10: $PM10 / PM25: $PM25"

          # 값이 비정상이면 종료
          if [ -z "$PM10" ] || [ -z "$PM25" ] || [ -z "$DATA_HOUR" ] || [ "$PM10" = "null" ] || [ "$PM25" = "null" ]; then
            echo "데이터 파싱 실패 → 종료"
            exit 1
          fi

          echo "{ \"pm10\": \"$PM10\", \"pm25\": \"$PM25\", \"dataTime\": \"$DATATIME\", \"dataHour\": $DATA_HOUR }" > air.json

      - name: 변경사항 있으면 커밋 & 푸시
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add air.json
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "update air quality"
          git push
