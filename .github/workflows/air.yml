name: Update Air Quality

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: мҪ”л“ң к°Җм ёмҳӨкё°
        uses: actions/checkout@v4

      - name: м—җм–ҙмҪ”лҰ¬м•„ API нҳём¶ң
        shell: bash
        run: |
          set -e
          curl -L -s \
            -o air_raw.json \
            "https://apis.data.go.kr/B552584/ArpltnInforInqireSvc/getMsrstnAcctoRltmMesureDnsty?serviceKey=${{ secrets.AIR_KEY }}&returnType=json&numOfRows=1&pageNo=1&stationName=%EA%B3%A0%ED%98%84%EB%8F%99&dataTerm=DAILY&ver=1.3"

          echo "===== raw response preview ====="
          head -c 500 air_raw.json || true
          echo

      - name: JSON к°Җкіө
        shell: bash
        run: |
          # JSON м•„лӢҲл©ҙ мқҙлІҲ мӢӨн–үмқҖ кұҙл„ҲлңҖ
          if ! jq empty air_raw.json >/dev/null 2>&1; then
            echo "air_raw.jsonмқҙ JSON нҳ•мӢқмқҙ м•„лӢҳ. мқҙлІҲ мӢӨн–үмқҖ кұҙл„ҲлңҖ."
            exit 0
          fi

          RESULT_CODE=$(jq -r '.response.header.resultCode // empty' air_raw.json)
          if [ "$RESULT_CODE" != "00" ]; then
            echo "API resultCodeк°Җ м •мғҒмқҙ м•„лӢҳ: $RESULT_CODE"
            jq -r '.response.header' air_raw.json || true
            exit 0
          fi

          PM10=$(jq -r '.response.body.items[0].pm10Value // empty' air_raw.json)
          PM25=$(jq -r '.response.body.items[0].pm25Value // empty' air_raw.json)
          DATATIME=$(jq -r '.response.body.items[0].dataTime // empty' air_raw.json)

          if [ -z "$PM10" ] || [ -z "$PM25" ] || [ -z "$DATATIME" ] || [ "$PM10" = "null" ] || [ "$PM25" = "null" ]; then
            echo "н•„мҲҳ лҚ°мқҙн„° м—ҶмқҢ. мқҙлІҲ мӢӨн–үмқҖ кұҙл„ҲлңҖ."
            cat air_raw.json
            exit 0
          fi

          MONTH=$(echo "$DATATIME" | cut -d'-' -f2 | sed 's/^0//')
          DAY=$(echo "$DATATIME" | cut -d'-' -f3 | cut -d' ' -f1 | sed 's/^0//')
          DATA_HOUR=$(echo "$DATATIME" | grep -o '[0-9]\+мӢң' | sed 's/мӢң//')

          if [ -z "$DATA_HOUR" ]; then
            echo "dataHour м¶”м¶ң мӢӨнҢЁ. мқҙлІҲ мӢӨн–үмқҖ кұҙл„ҲлңҖ."
            exit 0
          fi

          LABEL_TIME="${MONTH}. ${DAY}. ${DATA_HOUR}мӢң"

          echo "API dataTime: $DATATIME"
          echo "API dataHour: $DATA_HOUR"
          echo "labelTime: $LABEL_TIME"
          echo "PM10: $PM10 / PM25: $PM25"

          echo "{ \"pm10\": \"$PM10\", \"pm25\": \"$PM25\", \"labelTime\": \"$LABEL_TIME\", \"dataTime\": \"$DATATIME\", \"dataHour\": $DATA_HOUR }" > air.json

      - name: м»Өл°Ӣ & н‘ёмӢң
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add air.json
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "update air quality"
          git push
