name: Update Air Quality

on:
  schedule:
    - cron: "*/10 * * * *"  # 10분마다 실행
  workflow_dispatch:       # 수동 실행도 가능

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: 에어코리아 API 호출
        run: |
          curl -o air_raw.json "https://apis.data.go.kr/B552584/ArpltnInforInqireSvc/getMsrstnAcctoRltmMesureDnsty?serviceKey=${{ secrets.AIR_KEY }}&returnType=json&numOfRows=1&pageNo=1&stationName=%EA%B3%A0%ED%98%84%EB%8F%99&dataTerm=DAILY&ver=1.3"

      - name: JSON 가공
        run: |
          PM10=$(jq -r '.response.body.items[0].pm10Value' air_raw.json)
          PM25=$(jq -r '.response.body.items[0].pm25Value' air_raw.json)

          echo "{ \"pm10\": $PM10, \"pm25\": $PM25 }" > air.json

      - name: 커밋 & 푸시
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add air.json
          git commit -m "update air quality" || echo "no changes"
          git push
