name: Update Air Quality

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v5

      - name: 에어코리아 API 호출
        shell: bash
        run: |
          curl -L -s \
            -o air_raw.json \
            "https://apis.data.go.kr/B552584/ArpltnInforInqireSvc/getMsrstnAcctoRltmMesureDnsty?serviceKey=${{ secrets.AIR_KEY }}&returnType=json&numOfRows=1&pageNo=1&stationName=%EA%B3%A0%ED%98%84%EB%8F%99&dataTerm=DAILY&ver=1.3"

          echo "===== raw response preview ====="
          head -c 500 air_raw.json || true
          echo

      - name: JSON 가공
        shell: bash
        run: |
          if ! jq empty air_raw.json >/dev/null 2>&1; then
            echo "air_raw.json이 JSON 형식이 아님. 이번 실행은 건너뜀."
            exit 0
          fi

          RESULT_CODE=$(jq -r '.response.header.resultCode // empty' air_raw.json)
          if [ "$RESULT_CODE" != "00" ]; then
            echo "API resultCode가 정상이 아님: $RESULT_CODE"
            jq -r '.response.header' air_raw.json || true
            exit 0
          fi

          PM10=$(jq -r '.response.body.items[0].pm10Value // empty' air_raw.json)
          PM25=$(jq -r '.response.body.items[0].pm25Value // empty' air_raw.json)
          DATATIME=$(jq -r '.response.body.items[0].dataTime // empty' air_raw.json)

          if [ -z "$PM10" ] || [ -z "$PM25" ] || [ -z "$DATATIME" ] || [ "$PM10" = "null" ] || [ "$PM25" = "null" ]; then
            echo "필수 데이터 없음. 이번 실행은 건너뜀."
            cat air_raw.json
            exit 0
          fi

          MONTH=$(echo "$DATATIME" | cut -d'-' -f2 | sed 's/^0//')
          DAY=$(echo "$DATATIME" | cut -d'-' -f3 | cut -d' ' -f1 | sed 's/^0//')
          DATA_HOUR=$(echo "$DATATIME" | grep -o '[0-9]\+시' | sed 's/시//')

          if [ -z "$DATA_HOUR" ]; then
            echo "dataHour 추출 실패. 이번 실행은 건너뜀."
            exit 0
          fi

          LABEL_TIME="${MONTH}. ${DAY}. ${DATA_HOUR}시"

          echo "API dataTime: $DATATIME"
          echo "API dataHour: $DATA_HOUR"
          echo "labelTime: $LABEL_TIME"
          echo "PM10: $PM10 / PM25: $PM25"

          printf '{ "pm10": "%s", "pm25": "%s", "labelTime": "%s", "dataTime": "%s", "dataHour": %s }\n' \
            "$PM10" "$PM25" "$LABEL_TIME" "$DATATIME" "$DATA_HOUR" > air.json

      - name: 커밋 & 푸시
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add air.json

          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi

          git commit -m "update air quality"
          git push
