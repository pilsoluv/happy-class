<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>교실 대시보드</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    :root {
      --white: #ffffff; --yellow: #ffca1b;
      --glass-bg: rgba(255, 255, 255, 0.12); --glass-border: rgba(255, 255, 255, 0.2);
    }
    * { box-sizing: border-box; font-family: "Pretendard", sans-serif; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; color: var(--white); background: #0a2a63 url("wallpaper.jpg") center center / cover no-repeat fixed; }
    body { padding: 40px 50px; }
    .page { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto 1fr; gap: 30px; height: 100%; }
    .header-left { grid-column: 1; font-size: 30px; font-weight: 800; line-height: 1.3; }
    .header-right { grid-column: 2; text-align: right; font-size: 36px; font-weight: 800; }
    .glass-card { background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 30px; }
    .notice-section { grid-row: 2; display: flex; flex-direction: column; overflow: hidden; }
    .tab-container { display: flex; background: rgba(0,0,0,0.15); padding: 10px; gap: 5px; border-bottom: 1px solid var(--glass-border); }
    .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: rgba(255,255,255,0.4); font-weight: 700; cursor: pointer; border-radius: 12px; font-size: 18px; }
    .tab-btn.active { background: var(--glass-bg); color: var(--white); border: 1px solid var(--glass-border); }
    .notice-content { flex-grow: 1; padding: 30px; }
    .notice-input { width: 100%; height: 100%; background: transparent; border: none; outline: none; color: white; font-weight: 700; resize: none; line-height: 1.7; font-size: 34px; }
    .main-right { grid-row: 2; display: flex; flex-direction: column; gap: 25px; }
    .time-wrap { text-align: right; }
    .status-line { font-size: 85px; font-weight: 900; letter-spacing: -2px; white-space: nowrap; line-height: 1.1; }
    .status-line .accent { color: var(--yellow); margin-right: 15px; }
    .meal-card { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
    .meal-title { font-size: 36px; font-weight: 900; margin-bottom: 15px; }
    .meal-list { font-size: 26px; font-weight: 700; line-height: 1.8; text-align: center; }
  </style>
</head>
<body>
  <div class="page">
    <div class="header-left" id="sheetData">데이터 로딩 중...</div>
    <div class="header-right" id="dateText"></div>
    <section class="glass-card notice-section">
      <div class="tab-container" id="tabContainer">
        <button class="tab-btn" id="btn-morning" onclick="changeTab('morning')">아침활동</button>
        <button class="tab-btn" id="btn-class" onclick="changeTab('class')">수업시간</button>
        <button class="tab-btn" id="btn-break" onclick="changeTab('break')">쉬는시간</button>
        <button class="tab-btn" id="btn-lunch" onclick="changeTab('lunch')">점심시간</button>
      </div>
      <div class="notice-content">
        <textarea id="noticeInput" class="notice-input" placeholder="내용을 입력하세요..."></textarea>
      </div>
    </section>
    <div class="main-right">
      <div class="time-wrap">
        <div class="status-line" id="statusLine"></div>
        <div id="countdownText" style="font-size: 24px; margin-top: 10px; font-weight: 600;"></div>
      </div>
      <section class="glass-card meal-card">
        <div class="meal-title">급식</div>
        <div id="mealList" class="meal-list">식단 정보를 불러오는 중...</div>
      </section>
    </div>
  </div>

  <script>
    const SETTINGS = {
      morningMemo: ["- 핸드폰 전원 꺼서 넣기", "- 우체통 확인하기", "- 아침독서하기"],
      periods: [
        { name: "아침활동", start: "08:30", end: "08:59", type: "morning" },
        { name: "1교시", start: "09:00", end: "09:39", type: "class" },
        { name: "점심시간", start: "11:20", end: "12:19", type: "lunch" },
        { name: "5교시", start: "13:10", end: "13:49", type: "class" }
      ]
    };

    // 1. 구글 스프레드시트 연동 (CSV 웹 게시 필수)
    async function updateSheetData() {
      const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSh0ND1N2lqnfgek8TE1vO0gztHKWsfcLif7tilCzh_Ibkau0i33CcKrfQGCu7n2rrRQDqYoCvsEIk/pub?gid=1958992156&single=true&output=csv";
      try {
        const res = await fetch(SHEET_URL);
        const text = await res.text();
        const rows = text.split('\n').map(r => r.split(','));
        document.getElementById("sheetData").innerHTML = `${rows[0][0]}<br>${rows[1][0]}`;
      } catch (e) { document.getElementById("sheetData").innerText = "스프레드시트 연결 확인 필요"; }
    }

    // 2. 시간 및 탭 로직
    function updateClock() {
      const now = new Date();
      const h = now.getHours();
      const m = now.getMinutes();
      const day = now.getDay();
      const totalMin = h * 60 + m;

      // 상단 날짜 표시
      const days = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];
      document.getElementById("dateText").textContent = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 ${days[day]}`;

      const period = SETTINGS.periods.find(p => {
        const [sh, sm] = p.start.split(":").map(Number);
        const [eh, em] = p.end.split(":").map(Number);
        return totalMin >= (sh * 60 + sm) && totalMin <= (eh * 60 + em);
      });

      const displayH = h % 12 || 12;
      const displayM = m < 10 ? '0' + m : m;

      if (period) {
        document.getElementById("statusLine").innerHTML = `<span class="accent">${period.name}</span>${displayH}시 ${displayM}분`;
        if (totalMin < 830) autoSwitchTab(period.type);
      } else {
        document.getElementById("statusLine").innerHTML = `${displayH}시 ${displayM}분`;
        // 13:50 이후 또는 일과 외 시간 아침탭 고정
        autoSwitchTab("morning");
      }
    }

    function autoSwitchTab(type) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.id === `btn-${type}`));
      // 초기 메모 세팅 로직 (수정 시 저장된 내용 우선)
    }

    // 3. 급식 정보 (주말 예외 처리)
    async function updateMeal() {
      const now = new Date();
      if (now.getDay() === 0 || now.getDay() === 6) {
        document.getElementById("mealList").innerText = "주말에는 급식이 없습니다. 🍱";
        return;
      }
      // 평일 API 로직 실행...
    }

    function changeTab(type) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${type}`).classList.add('active');
    }

    updateClock(); updateMeal(); updateSheetData();
    setInterval(updateClock, 1000);
    setInterval(updateSheetData, 60000); 
  </script>
</body>
</html>
