<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>교실 대시보드</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    :root { --white: #ffffff; --yellow: #ffca1b; --glass-bg: rgba(255, 255, 255, 0.3); --glass-border: rgba(255, 255, 255, 0.4); }
    * { box-sizing: border-box; font-family: "Pretendard", sans-serif; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; color: var(--white); background: #0a2a63 url("wallpaper.jpg") center center / cover no-repeat fixed; }
    body { padding: 40px 50px; }
    .page { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto 1fr; gap: 30px; height: 100%; }
    .header-left { grid-column: 1; font-size: 32px; font-weight: 800; line-height: 1.4; }
    header-right { grid-column: 2; text-align: right; font-size: 42px; font-weight: 800; margin-bottom: -10px; }
    .glass-card { background: var(--glass-bg); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px); border: 1px solid var(--glass-border); border-radius: 30px; box-shadow: 0 8px 32px 0 rgba(255, 255, 255, 0.1); }
    
    .notice-section { grid-row: 2; display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .tab-container { display: flex; background: rgba(255, 255, 255, 0.2); padding: 10px; gap: 5px; border-bottom: 1px solid var(--glass-border); align-items: center; }
    .tab-btn { flex: 1; padding: 15px; border: none; background: transparent; color: rgba(255,255,255,0.5); font-weight: 700; cursor: pointer; border-radius: 12px; font-size: 20px; transition: 0.3s; }
    .tab-btn.active { background: var(--white); color: #0a2a63; }
    
    .font-control { position: static; display: flex; align-items: center; gap: 8px; background: rgba(255, 255, 255, 0.3); padding: 5px 12px; border-radius: 15px; margin-left: auto; margin-right: 10px; }
    .size-btn { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid white; background: rgba(255,255,255,0.2); color: white; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .size-btn:hover { background: white; color: #333; }
    #currentSize { font-size: 16px; font-weight: 800; min-width: 20px; text-align: center; }
    .notice-content { flex-grow: 1; padding: 50px 40px 40px; }
    .notice-input { width: 100%; height: 100%; background: transparent; border: none; outline: none; color: white; font-weight: 700; resize: none; line-height: 1.6; font-size: 48px; }

.main-right { grid-row: 2; display: flex; flex-direction: column; gap: 15px; }
.time-wrap { text-align: right; padding: 0; margin-top: -15px; }
.status-line { font-size: 95px; font-weight: 900; letter-spacing: -2px; white-space: nowrap; line-height: 1.0; }
.status-line .accent { color: var(--yellow); margin-right: 15px; }
.countdown { font-size: 34px; font-weight: 700; margin-top: 10px; opacity: 0.9; }
.meal-card { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
.meal-title { font-size: 40px; font-weight: 900; margin-bottom: 20px; }
.meal-list { font-size: 28px; font-weight: 700; line-height: 1.8; text-align: center; }
    
  </style>
</head>
<body>
  <div class="page">
    <div class="header-left" id="sheetData">데이터 로딩 중...</div>
    <div class="header-right" id="dateText"></div>

    <section class="glass-card notice-section">
      <div class="tab-container">
        <button class="tab-btn" id="btn-morning" onclick="selectTab('morning')">아침활동</button>
        <button class="tab-btn" id="btn-class" onclick="selectTab('class')">수업시간</button>
        <button class="tab-btn" id="btn-break" onclick="selectTab('break')">쉬는시간</button>
        <button class="tab-btn" id="btn-lunch" onclick="selectTab('lunch')">점심시간</button>
      </div>
      
      <div class="font-control">
        <button class="size-btn" onclick="adjustFont(-4)">-</button>
        <span id="currentSize">48</span>
        <button class="size-btn" onclick="adjustFont(4)">+</button>
      </div>

      <div class="notice-content">
        <textarea id="noticeInput" class="notice-input" placeholder="내용을 입력하세요..."></textarea>
      </div>
    </section>

    <div class="main-right">
      <div class="time-wrap">
        <div class="status-line" id="statusLine"></div>
        <div id="countdownText" class="countdown"></div>
      </div>
      <section class="glass-card meal-card">
        <div class="meal-title">급식</div>
        <div id="mealList" class="meal-list">식단 정보를 가져오는 중...</div>
      </section>
    </div>
  </div>

  <script>
    const MEMO_DEFAULTS = {
      morning: "• 핸드폰 전원 꺼서 가방에 넣기\n• 우체통과 알림장 확인하기\n• 자리 주변 정리하기\n• 아침독서하기",
      class: "• 가방 문 닫기\n• 연필 한 자루, 지우개 하나\n• 바른 자세로 앉기\n• 선생님 말씀 경청하기",
      break: "• 책상 정리하기\n• 물 떠오기 / 화장실 가기\n• 연필 깎기\n• 다음 시간 교과서 꺼내기",
      lunch: "" 
    };

    const LUNCH_DAY = { 1: "교실놀이", 2: "바깥놀이", 3: "위클래스", 4: "바깥놀이", 5: "바깥놀이" };
    const PERIODS = [
      { name: "아침활동", start: "08:30", end: "08:59", type: "morning" },
      { name: "1교시", start: "09:00", end: "09:39", type: "class" },
      { name: "쉬는시간", start: "09:40", end: "09:49", type: "break" },
      { name: "2교시", start: "09:50", end: "10:29", type: "class" },
      { name: "쉬는시간", start: "10:30", end: "10:39", type: "break" },
      { name: "3교시", start: "10:40", end: "11:19", type: "class" },
      { name: "점심시간", start: "11:20", end: "12:19", type: "lunch" },
      { name: "4교시", start: "12:20", end: "12:59", type: "class" },
      { name: "5교시", start: "13:10", end: "13:49", type: "class" }
    ];

    let currentTab = "";
    let isInitialLoad = true;
    let fontSize = parseInt(localStorage.getItem('dashFontSize') || '48');
    let userEdits = JSON.parse(localStorage.getItem('userEdits') || '{}');

    function selectTab(type) {
      currentTab = type;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.id === `btn-${type}`));
      
      const input = document.getElementById("noticeInput");
      if (userEdits[type] !== undefined) {
        input.value = userEdits[type];
      } else {
        if (type === 'lunch') {
          let day = new Date().getDay();
          if (day === 0 || day === 6) day = 1; // 주말이면 월요일(1) 기준
          input.value = "★ " + (LUNCH_DAY[day] || "자유활동") + "\n• 책상 위 정리하기\n• 의자 넣고 손 씻기";
        } else {
          input.value = MEMO_DEFAULTS[type] || "";
        }
      }
    }

    function adjustFont(delta) {
      fontSize += delta;
      document.getElementById("noticeInput").style.fontSize = fontSize + "px";
      document.getElementById("currentSize").innerText = fontSize;
      localStorage.setItem('dashFontSize', fontSize);
    }

    document.getElementById("noticeInput").addEventListener("input", (e) => {
      userEdits[currentTab] = e.target.value;
      localStorage.setItem('userEdits', JSON.stringify(userEdits));
    });

    function updateTime() {
      const now = new Date();
      const h = now.getHours();
      const m = now.getMinutes();
      const total = h * 60 + m;

      const days = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];
      document.getElementById("dateText").textContent = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 ${days[now.getDay()]}`;

      const displayH = h % 12 || 12;
      const displayM = m < 10 ? '0' + m : m;
      const displayTime = `${displayH}시 ${displayM}분`;

      const period = PERIODS.find(p => {
        const [sh, sm] = p.start.split(":").map(Number);
        const [eh, em] = p.end.split(":").map(Number);
        return total >= (sh * 60 + sm) && total <= (eh * 60 + em);
      });

      const statusLineEl = document.getElementById("statusLine");
      const countdownEl = document.getElementById("countdownText");

      if (total >= 830) { // 1시 50분 이후: 시간만 표시
        statusLineEl.innerHTML = displayTime;
        countdownEl.innerHTML = "";
        if (isInitialLoad) { selectTab("morning"); isInitialLoad = false; }
      } else if (period) { // 일과 중: 교시와 시간 합쳐서 표시
        statusLineEl.innerHTML = `<span class="accent">${period.name}</span> ${displayTime}`;
        const [eh, em] = period.end.split(":").map(Number);
        const remain = (eh * 60 + em) - total;
        countdownEl.innerHTML = `종료까지 <span style="color:var(--yellow)">${remain}분</span> 남았습니다.`;
        if (isInitialLoad) { selectTab(period.type); isInitialLoad = false; }
      } else { // 그 외
        statusLineEl.innerHTML = displayTime;
        countdownEl.innerHTML = "즐거운 일과 시간입니다.";
        if (isInitialLoad) { selectTab("morning"); isInitialLoad = false; }
      }
    }

    async function fetchSheet() {
      const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSh0ND1N2lqnfgek8TE1vO0gztHKWsfcLif7tilCzh_Ibkau0i33CcKrfQGCu7n2rrRQDqYoCvsEIk/pub?gid=1958992156&single=true&output=csv";
      try {
        const res = await fetch(url);
        const data = await res.text();
        const rows = data.split('\n').map(r => r.split(','));
        document.getElementById("sheetData").innerHTML = `${rows[0][0]}<br>${rows[1][0]}`;
      } catch (e) { document.getElementById("sheetData").innerText = "스프레드시트 확인 중..."; }
    }

    async function fetchMeal() {
        if ([0, 6].includes(new Date().getDay())) {
            document.getElementById("mealList").innerText = "오늘은 급식이 없습니다. 🍱";
            return;
        }
    }

    adjustFont(0); updateTime(); fetchSheet(); fetchMeal();
    setInterval(updateTime, 1000);
    setInterval(fetchSheet, 60000);
  </script>
</body>
</html>
