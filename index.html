<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>우리반 대시보드</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    :root { --white: #ffffff; --black: #1a1a1a; --yellow: #ffca1b; --accent-red: #ff6b6b; }
    * { box-sizing: border-box; font-family: "Pretendard", sans-serif; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; color: var(--white); background: #0a2a63 url("wallpaper.jpg") center center / cover no-repeat fixed; }
    body { padding: 40px 60px; position: relative; }

    /* 페이지 레이아웃 */
    .view-page { display: none; height: 100%; grid-template-rows: auto 1fr; gap: 30px; }
    .view-page.active { display: grid; }
    
    /* 헤더 (시안 위치 고정) */
    .header { display: flex; justify-content: space-between; align-items: flex-start; }
    .header-left { font-size: 42px; font-weight: 800; line-height: 1.3; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
    .header-right { text-align: right; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
    .date-text { font-size: 50px; font-weight: 900; }
    .clock-text { font-size: 110px; font-weight: 950; margin-top: -15px; line-height: 1; letter-spacing: -3px; }
    .countdown { font-size: 42px; font-weight: 800; color: var(--yellow); margin-top: 5px; }

    /* 카드 스타일 */
    .glass-card { background: white; border-radius: 30px; color: var(--black); box-shadow: 0 15px 50px rgba(0,0,0,0.4); overflow: hidden; display: flex; flex-direction: column; height: 100%; }

    /* 1페이지 구성 */
    .dashboard-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 40px; height: 100%; }
    .tab-container { display: flex; background: #f8f9fa; padding: 10px; gap: 8px; border-bottom: 2px solid #eee; }
    .tab-btn { flex: 1; padding: 15px; border: none; background: transparent; color: #adb5bd; font-weight: 800; cursor: pointer; border-radius: 15px; font-size: 24px; transition: 0.2s; }
    .tab-btn.active { background: #0a2a63; color: var(--white); }
    .notice-input { width: 100%; height: 100%; border: none; outline: none; padding: 40px; font-weight: 800; resize: none; line-height: 1.6; font-size: 45px; color: var(--black); }

    /* 2페이지 구성 (알림장 & 학생체크) */
    .board-layout { display: grid; grid-template-rows: 1.2fr 0.8fr; gap: 25px; height: 100%; }
    .board-header { display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; border-bottom: 2px solid #eee; }
    .board-title { font-size: 48px; font-weight: 900; color: #0a2a63; }
    .font-ctrl { position: absolute; right: 30px; display: flex; align-items: center; gap: 10px; background: #eee; padding: 8px 15px; border-radius: 30px; }
    .size-btn { border: 1.5px solid #ccc; background: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 20px; font-weight: 900; display: flex; align-items: center; justify-content: center; }
    .memo-area { flex-grow: 1; border: none; padding: 40px; font-weight: 800; resize: none; outline: none; line-height: 1.5; }
    .student-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
    .student-item { padding: 18px 5px; background: white; border: 1px solid #ddd; border-radius: 15px; color: var(--black); font-size: 22px; font-weight: 800; text-align: center; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .student-item.checked { background: var(--accent-red); color: white; border-color: var(--accent-red); }

    /* 하단 버튼 (동그라미 아이콘) */
    .util-container { position: fixed; bottom: 30px; right: 30px; display: flex; gap: 15px; z-index: 1000; }
    .util-btn { width: 55px; height: 55px; background: rgba(0,0,0,0.5); border: 1.5px solid rgba(255,255,255,0.6); color: white; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); transition: 0.3s; }
    .util-btn:hover { transform: scale(1.1); background: rgba(0,0,0,0.7); }
    svg { width: 28px; height: 28px; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-left" id="sheetData">데이터 로딩 중...</div>
    <div class="header-right">
      <div class="date-text" id="dateText"></div>
      <div class="clock-text" id="clockText"></div>
      <div class="countdown" id="countdownText"></div>
    </div>
  </header>

  <main id="page1" class="view-page active">
    <div class="dashboard-grid">
      <section class="glass-card">
        <div class="tab-container">
          <button class="tab-btn" id="btn-morning" onclick="selectTab('morning')">아침활동</button>
          <button class="tab-btn" id="btn-class" onclick="selectTab('class')">수업시간</button>
          <button class="tab-btn" id="btn-break" onclick="selectTab('break')">쉬는시간</button>
          <button class="tab-btn" id="btn-lunch" onclick="selectTab('lunch')">점심시간</button>
        </div>
        <textarea id="noticeInput" class="notice-input" placeholder="여기에 내용을 적으세요."></textarea>
      </section>
      <section class="glass-card" style="align-items: center; justify-content: center; padding: 50px;">
        <div style="font-size: 56px; font-weight: 900; color: #0a2a63; margin-bottom: 30px; border-bottom: 6px solid var(--yellow); padding-bottom: 10px;">오늘의 급식 🍱</div>
        <div id="mealList" style="font-size: 36px; font-weight: 800; text-align: center; color: #333; line-height: 2;">메뉴 정보를 가져오는 중...</div>
      </section>
    </div>
  </main>

  <main id="page2" class="view-page">
    <div class="board-layout">
      <section class="glass-card">
        <div class="board-header">
          <div class="board-title">알림장</div>
          <div class="font-ctrl">
            <button class="size-btn" onclick="adjFont(-4)">-</button>
            <span id="curSize" style="font-weight: 800; color: #444;">45</span>
            <button class="size-btn" onclick="adjFont(4)">+</button>
          </div>
        </div>
        <textarea class="memo-area" id="boardMemo" placeholder="아이들에게 보여줄 알림장을 적으세요."></textarea>
      </section>
      <div class="student-grid" id="studentList"></div>
    </div>
  </main>

  <div class="util-container">
    <button class="util-btn" onclick="toggleFS()" title="전체화면">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
    </button>
    <button class="util-btn" onclick="switchPg()" title="페이지 전환">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m11 17-5-5 5-5m6 10 5-5-5-5"/></svg>
    </button>
  </div>

  <script>
    /* 학생 명단 */
    const students = ["김민채", "김아준", "민예린", "송유하", "신서울", "신수호", "안동윤", "안동은", "안시윤", "오준서", "윤노아", "이도희", "이유나", "이은서", "전민서", "조우준", "최민국", "최승효", "황민영", "황슬아", "김세아"];
    const listWrap = document.getElementById('studentList');
    students.forEach(name => {
      const div = document.createElement('div');
      div.className = 'student-item';
      div.innerText = name;
      div.onclick = () => div.classList.toggle('checked');
      listWrap.appendChild(div);
    });

    /* 로컬 스토리지 연동 */
    const noticeInput = document.getElementById("noticeInput");
    const boardMemo = document.getElementById("boardMemo");
    let userEdits = JSON.parse(localStorage.getItem('userEdits') || '{}');
    let boardData = localStorage.getItem('boardMemo') || "";
    let fontSize = parseInt(localStorage.getItem('boardFS') || '45');

    boardMemo.value = boardData;
    boardMemo.style.fontSize = fontSize + "px";
    document.getElementById("curSize").innerText = fontSize;

    noticeInput.addEventListener("input", () => {
      userEdits[currentTab] = noticeInput.value;
      localStorage.setItem('userEdits', JSON.stringify(userEdits));
    });
    boardMemo.addEventListener("input", () => {
      localStorage.setItem('boardMemo', boardMemo.value);
    });

    function adjFont(delta) {
      fontSize += delta;
      boardMemo.style.fontSize = fontSize + "px";
      document.getElementById("curSize").innerText = fontSize;
      localStorage.setItem('boardFS', fontSize);
    }

    /* 시정표 로직 */
    const PERIODS = [
      { name: "아침활동", start: "08:30", end: "08:59", type: "morning" },
      { name: "1교시", start: "09:00", end: "09:39", type: "class" },
      { name: "쉬는시간", start: "09:40", end: "09:49", type: "break" },
      { name: "2교시", start: "09:50", end: "10:29", type: "class" },
      { name: "3교시", start: "10:40", end: "11:19", type: "class" },
      { name: "점심시간", start: "11:20", end: "12:19", type: "lunch" }
    ];

    let currentTab = "";
    function selectTab(type) {
      currentTab = type;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.id === `btn-${type}`));
      noticeInput.value = userEdits[type] || "";
    }

    function updateTime() {
      const now = new Date();
      const h = now.getHours(); const m = now.getMinutes();
      const total = h * 60 + m;
      const days = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];
      
      document.getElementById("dateText").innerText = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}`;
      document.getElementById("clockText").innerText = `${h % 12 || 12}시 ${m < 10 ? '0'+m : m}분`;

      const period = PERIODS.find(p => {
        const [sh, sm] = p.start.split(":").map(Number);
        const [eh, em] = p.end.split(":").map(Number);
        return total >= (sh * 60 + sm) && total <= (eh * 60 + em);
      });

      const countEl = document.getElementById("countdownText");
      if (period) {
        const [eh, em] = period.end.split(":").map(Number);
        countEl.innerHTML = `<span style="color:white; font-size:28px; opacity:0.8;">${period.name}</span> 종료까지 ${ (eh*60+em) - total }분 남음`;
        if(!currentTab) selectTab(period.type);
      } else {
        countEl.innerText = ""; // '즐거운 일과시간' 삭제
        if(!currentTab) selectTab("morning");
      }
    }

    /* 구글 시트 연동 */
    async function fetchSheet() {
      const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSh0ND1N2lqnfgek8TE1vO0gztHKWsfcLif7tilCzh_Ibkau0i33CcKrfQGCu7n2rrRQDqYoCvsEIk/pub?gid=1958992156&single=true&output=csv";
      try {
        const res = await fetch(url);
        const data = await res.text();
        const rows = data.split('\n').map(r => r.split(','));
        document.getElementById("sheetData").innerHTML = `${rows[0][0]}<br>${rows[1][0]}`;
      } catch (e) { console.log("Sheet Error"); }
    }

    function toggleFS() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
    function switchPg() { document.getElementById('page1').classList.toggle('active'); document.getElementById('page2').classList.toggle('active'); }

    setInterval(updateTime, 1000); updateTime(); fetchSheet();
  </script>
</body>
</html>
