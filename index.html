<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>우리반 대시보드 V4</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    :root { --white: #ffffff; --black: #1a1a1a; --yellow: #ffca1b; --accent-red: #ff6b6b; }
    * { box-sizing: border-box; font-family: "Pretendard", sans-serif; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; color: var(--white); background: #0a2a63 url("wallpaper.jpg") center center / cover no-repeat fixed; }
    body { padding: 30px 50px; position: relative; display: flex; flex-direction: column; }

    /* 헤더 영역 - 시안 스타일 */
    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
    .header-left { font-size: 32px; font-weight: 800; line-height: 1.2; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    .header-right { text-align: right; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    .date-row { font-size: 45px; font-weight: 900; display: flex; align-items: center; justify-content: flex-end; gap: 15px; }
    .clock-row { font-size: 100px; font-weight: 950; margin-top: -10px; line-height: 1; letter-spacing: -2px; }
    .clock-row .period-label { color: var(--yellow); font-size: 60px; margin-right: 15px; }
    .countdown-msg { font-size: 32px; font-weight: 800; color: var(--yellow); margin-top: 5px; }

    /* 카드 공통 */
    .glass-card { background: white; border-radius: 25px; color: var(--black); box-shadow: 0 10px 40px rgba(0,0,0,0.3); overflow: hidden; display: flex; flex-direction: column; }

    /* 1페이지: 메인 */
    .view-page { display: none; height: calc(100vh - 220px); }
    .view-page.active { display: grid; }
    .dashboard-grid { grid-template-columns: 1.1fr 0.9fr; gap: 30px; }
    .tab-container { display: flex; background: #f1f3f5; padding: 8px; gap: 5px; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: #adb5bd; font-weight: 800; cursor: pointer; border-radius: 12px; font-size: 20px; }
    .tab-btn.active { background: #0a2a63; color: var(--white); }
    .notice-input { width: 100%; height: 100%; border: none; outline: none; padding: 30px; font-weight: 800; resize: none; line-height: 1.5; font-size: 40px; }

    /* 2페이지: 알림장 전용 */
    .board-layout { display: flex; flex-direction: column; gap: 20px; height: 100%; }
    .board-main { flex: 1; position: relative; }
    .board-header { position: absolute; top: 15px; width: 100%; display: flex; justify-content: center; align-items: center; pointer-events: none; }
    .board-header span { font-size: 40px; font-weight: 900; color: #0a2a63; pointer-events: auto; }
    .font-ctrl { position: absolute; top: 15px; right: 20px; z-index: 10; display: flex; align-items: center; gap: 8px; background: #eee; padding: 5px 12px; border-radius: 20px; }
    .date-nav { cursor: pointer; user-select: none; padding: 0 10px; }
    .size-btn { border: none; background: white; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-weight: 900; }
    .memo-area { width: 100%; height: 100%; border: none; padding: 80px 40px 40px; font-weight: 800; resize: none; outline: none; }

    /* 학생 명단 (2페이지 하단) */
    .student-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
    .student-item { padding: 15px 5px; background: white; border-radius: 12px; color: var(--black); font-size: 20px; font-weight: 800; text-align: center; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    .student-item.checked { background: var(--accent-red); color: white; }

    /* 유틸 버튼 */
    .util-container { position: fixed; bottom: 25px; right: 25px; display: flex; gap: 12px; }
    .util-btn { width: 50px; height: 50px; background: rgba(0,0,0,0.4); border: 1.5px solid rgba(255,255,255,0.5); color: white; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-left" id="sheetData">로딩 중...</div>
    <div class="header-right">
      <div class="date-row">
        <span class="date-nav" onclick="changeDate(-1)">&lt;</span>
        <span id="displayDate"></span>
        <span class="date-nav" onclick="changeDate(1)">&gt;</span>
      </div>
      <div class="clock-row">
        <span class="period-label" id="periodLabel"></span>
        <span id="clockText"></span>
      </div>
      <div class="countdown-msg" id="countdownText"></div>
    </div>
  </header>

  <main id="page1" class="view-page active">
    <div class="dashboard-grid">
      <section class="glass-card">
        <div class="tab-container">
          <button class="tab-btn" id="btn-morning" onclick="selectTab('morning')">아침활동</button>
          <button class="tab-btn" id="btn-class" onclick="selectTab('class')">수업시간</button>
          <button class="tab-btn" id="btn-break" onclick="selectTab('break')">쉬는시간</button>
          <button class="tab-btn" id="btn-lunch" onclick="selectTab('lunch')">점심시간</button>
        </div>
        <textarea id="noticeInput" class="notice-input"></textarea>
      </section>
      <section class="glass-card" style="align-items: center; justify-content: center; padding: 40px;">
        <div style="font-size: 50px; font-weight: 900; color: #0a2a63; margin-bottom: 20px; border-bottom: 5px solid var(--yellow);">오늘의 급식 🍱</div>
        <div id="mealList" style="font-size: 32px; font-weight: 800; text-align: center; color: #333; line-height: 1.8;">식단 로딩 중...</div>
      </section>
    </div>
  </main>

  <main id="page2" class="view-page">
    <div class="board-layout">
      <section class="glass-card board-main">
        <div class="board-header"><span>알림장</span></div>
        <div class="font-ctrl">
          <button class="size-btn" onclick="adjFont(-2)">-</button>
          <span id="curSize">40</span>
          <button class="size-btn" onclick="adjFont(2)">+</button>
        </div>
        <textarea class="memo-area" id="boardMemo" placeholder="내용을 입력하세요..."></textarea>
      </section>
      <div class="student-grid" id="studentList"></div>
    </div>
  </main>

  <div class="util-container">
    <button class="util-btn" onclick="toggleFS()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg></button>
    <button class="util-btn" onclick="switchPg()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m11 17-5-5 5-5m6 10 5-5-5-5"/></svg></button>
  </div>

  <script>
    const students = ["김민채", "김아준", "민예린", "송유하", "신서울", "신수호", "안동윤", "안동은", "안시윤", "오준서", "윤노아", "이도희", "이유나", "이은서", "전민서", "조우준", "최민국", "최승효", "황민영", "황슬아", "김세아"];
    const PERIODS = [
      { name: "아침활동", start: "08:30", end: "08:59", type: "morning" },
      { name: "1교시", start: "09:00", end: "09:39", type: "class" },
      { name: "쉬는시간", start: "09:40", end: "09:49", type: "break" },
      { name: "2교시", start: "09:50", end: "10:29", type: "class" },
      { name: "3교시", start: "10:40", end: "11:19", type: "class" },
      { name: "점심시간", start: "11:20", end: "12:19", type: "lunch" }
    ];

    let viewingDate = new Date();
    let currentTab = "";

    function init() {
      const listWrap = document.getElementById('studentList');
      students.forEach(name => {
        const div = document.createElement('div');
        div.className = 'student-item';
        div.innerText = name;
        div.onclick = () => div.classList.toggle('checked');
        listWrap.appendChild(div);
      });
      loadBoardData();
      updateTime();
      fetchSheet();
      setInterval(updateTime, 1000);
    }

    function updateTime() {
      const now = new Date();
      const h = now.getHours(); const m = now.getMinutes();
      const total = h * 60 + m;
      const days = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];
      
      document.getElementById("displayDate").innerText = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}`;
      document.getElementById("clockText").innerText = `${h % 12 || 12}시 ${m < 10 ? '0'+m : m}분`;

      const p = PERIODS.find(p => {
        const [sh, sm] = p.start.split(":").map(Number);
        const [eh, em] = p.end.split(":").map(Number);
        return total >= (sh * 60 + sm) && total <= (eh * 60 + em);
      });

      const labelEl = document.getElementById("periodLabel");
      const countEl = document.getElementById("countdownText");

      if (p) {
        labelEl.innerText = p.name;
        const [eh, em] = p.end.split(":").map(Number);
        countEl.innerText = `${p.type === 'class' ? '쉬는시간' : '수업시간'}까지 ${ (eh*60+em) - total }분 남았습니다.`;
        if(!currentTab) selectTab(p.type);
      } else {
        labelEl.innerText = "";
        countEl.innerText = ""; // 시외 시간은 비움
        if(!currentTab) selectTab("morning");
      }
    }

    function changeDate(delta) {
      viewingDate.setDate(viewingDate.getDate() + delta);
      loadBoardData();
    }

    function loadBoardData() {
      const key = viewingDate.toISOString().split('T')[0];
      document.getElementById("boardMemo").value = localStorage.getItem('memo_' + key) || "";
    }

    document.getElementById("boardMemo").addEventListener("input", (e) => {
      const key = viewingDate.toISOString().split('T')[0];
      localStorage.setItem('memo_' + key, e.target.value);
    });

    let fontSize = parseInt(localStorage.getItem('boardFS') || '40');
    function adjFont(d) {
      fontSize += d;
      document.getElementById("boardMemo").style.fontSize = fontSize + "px";
      document.getElementById("curSize").innerText = fontSize;
      localStorage.setItem('boardFS', fontSize);
    }

    function selectTab(type) {
      currentTab = type;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.id === `btn-${type}`));
      document.getElementById("noticeInput").value = JSON.parse(localStorage.getItem('userEdits') || '{}')[type] || "";
    }

    document.getElementById("noticeInput").addEventListener("input", (e) => {
      let edits = JSON.parse(localStorage.getItem('userEdits') || '{}');
      edits[currentTab] = e.target.value;
      localStorage.setItem('userEdits', JSON.stringify(edits));
    });

    async function fetchSheet() {
      const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSh0ND1N2lqnfgek8TE1vO0gztHKWsfcLif7tilCzh_Ibkau0i33CcKrfQGCu7n2rrRQDqYoCvsEIk/pub?gid=1958992156&single=true&output=csv";
      try {
        const res = await fetch(url);
        const data = await res.text();
        const rows = data.split('\n').map(r => r.split(','));
        document.getElementById("sheetData").innerHTML = `${rows[0][0]}<br>${rows[1][0]}`;
      } catch (e) {}
    }

    function toggleFS() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
    function switchPg() { document.getElementById('page1').classList.toggle('active'); document.getElementById('page2').classList.toggle('active'); }
    
    init();
    adjFont(0);
  </script>
</body>
</html>
