<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>교실 대시보드</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    :root{
      --bg:#0a2a63;
      --card-bg:rgba(255,255,255,0.92);
      --card-border:rgba(0,0,0,0.12);
      --text:#111;
      --white:#fff;
      --navy:#0f2f73;
      --yellow:#ffca1b;

      --page-padding:20px;
      --col-gap:20px;
      --row-gap:16px;

      --left-col:58%;
      --right-col:42%;

      --left-top-h:110px;
      --right-top-h:190px;

      --header-font:58px;
      --date-font:56px;
      --time-font:108px;
      --count-font:34px;
      --tab-font:22px;
      --notice-font:64px;
      --meal-title-font:50px;
      --meal-font:32px;
    }

    *{box-sizing:border-box;font-family:"Pretendard",sans-serif;}
    html,body{margin:0;width:100%;height:100%;}
    body{background:var(--bg) url("wallpaper.jpg") center/cover no-repeat fixed;color:var(--white);overflow:hidden;}
    .app{width:100%;height:100%;padding:var(--page-padding);}
    .page{width:100%;height:100%;display:grid;grid-template-columns:var(--left-col) var(--right-col);gap:var(--col-gap);}
    .col{min-height:0;display:grid;gap:var(--row-gap);}
    .left-col{grid-template-rows:var(--left-top-h) 1fr;}
    .right-col{grid-template-rows:var(--right-top-h) 1fr;}

    .card{min-height:0;background:var(--card-bg);color:var(--text);border-radius:28px;border:2px solid var(--card-border);box-shadow:0 10px 28px rgba(0,0,0,0.12);overflow:hidden;}

    .header-card{padding:18px 22px;display:flex;align-items:flex-start;justify-content:flex-start;font-size:var(--header-font);font-weight:900;line-height:1.18;white-space:pre-line;color:var(--white);background:transparent;border:none;box-shadow:none;text-shadow:2px 2px 5px rgba(0,0,0,0.35);}

    .right-top{padding:6px 8px 0 8px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;text-align:center;background:transparent;border:none;box-shadow:none;}
    .date-line{font-size:var(--date-font);font-weight:900;line-height:1.04;text-shadow:2px 2px 5px rgba(0,0,0,0.35);margin-bottom:8px;}
    .time-line{font-size:var(--time-font);font-weight:950;line-height:1.0;letter-spacing:-2px;text-shadow:3px 3px 8px rgba(0,0,0,0.35);white-space:nowrap;}
    .time-line .accent{color:var(--yellow);margin-right:14px;}
    .count-line{font-size:var(--count-font);font-weight:900;line-height:1.08;margin-top:4px;text-shadow:2px 2px 5px rgba(0,0,0,0.35);}
    .count-line .accent{color:var(--yellow);}

    .notice-card{display:flex;flex-direction:column;}
    .tab-bar{display:flex;align-items:center;gap:8px;padding:12px;border-bottom:1px solid rgba(0,0,0,0.06);background:#f8f8f9;flex-shrink:0;}
    .tab-btn{flex:1;min-width:0;border:none;background:transparent;color:#b9bfc8;font-size:var(--tab-font);font-weight:900;padding:14px 10px;border-radius:14px;cursor:pointer;transition:0.15s ease;}
    .tab-btn.active{background:var(--navy);color:var(--white);}
    .font-control{display:flex;align-items:center;gap:8px;padding:5px 14px;background:#eceff2;border-radius:22px;flex-shrink:0;}
    .size-btn{width:34px;height:34px;border-radius:50%;border:2px solid #ced4da;background:#fff;color:#495057;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .size-value{color:#495057;font-weight:900;min-width:30px;text-align:center;font-size:20px;}
    .notice-content{flex:1;min-height:0;padding:28px 34px 30px 34px;}
    .notice-input{width:100%;height:100%;border:none;outline:none;resize:none;background:transparent;color:var(--text);font-size:var(--notice-font);font-weight:900;line-height:1.45;}

    .meal-card{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px 20px 20px 20px;text-align:center;}
    .meal-title{font-size:var(--meal-title-font);font-weight:950;color:var(--navy);line-height:1;padding-bottom:10px;margin-bottom:14px;border-bottom:5px solid var(--yellow);}
    .meal-list{font-size:var(--meal-font);font-weight:900;line-height:1.22;white-space:pre-line;color:#333;}

    @media (max-width:1500px){
      :root{
        --header-font:46px;
        --date-font:46px;
        --time-font:88px;
        --count-font:30px;
        --tab-font:20px;
        --notice-font:50px;
        --meal-title-font:42px;
        --meal-font:28px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="page">
      <div class="col left-col">
        <div class="header-card" id="sheetData">데이터를 불러오는 중...</div>

        <section class="card notice-card">
          <div class="tab-bar">
            <button class="tab-btn" id="btn-morning" onclick="selectTab('morning')">아침활동</button>
            <button class="tab-btn" id="btn-class" onclick="selectTab('class')">수업시간</button>
            <button class="tab-btn" id="btn-break" onclick="selectTab('break')">쉬는시간</button>
            <button class="tab-btn" id="btn-lunch" onclick="selectTab('lunch')">점심시간</button>

            <div class="font-control">
              <button class="size-btn" onclick="adjustFont(-4)">-</button>
              <span class="size-value" id="currentSize">64</span>
              <button class="size-btn" onclick="adjustFont(4)">+</button>
            </div>
          </div>

          <div class="notice-content">
            <textarea id="noticeInput" class="notice-input"></textarea>
          </div>
        </section>
      </div>

      <div class="col right-col">
        <section class="right-top">
          <div class="date-line" id="dateText">2026년 3월 12일 목요일</div>
          <div class="time-line" id="statusLine">1시 32분</div>
          <div class="count-line" id="countdownText">다음 일과까지 0분 남았습니다.</div>
        </section>

        <section class="card meal-card">
          <div class="meal-title">오늘의 급식 🍱</div>
          <div class="meal-list" id="mealList">오늘 급식을 불러오는 중...</div>
        </section>
      </div>
    </div>
  </div>

  <script>
    const BASIC_INFO_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQidILWyuflvuPJcl_yZGj5nAs6fVNaWXGUQAwzycSegpqo7UuHhEYYQIjOzRam-w8b2-yao3YmIYxi/pub?gid=0&single=true&output=csv";
    const NOTICE_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQidILWyuflvuPJcl_yZGj5nAs6fVNaWXGUQAwzycSegpqo7UuHhEYYQIjOzRam-w8b2-yao3YmIYxi/pub?gid=1154495982&single=true&output=csv";

    const DEFAULT_NOTICE={
      morning:"• 핸드폰 전원 꺼서 가방에 넣기\n• 우체통과 알림장 확인하기\n• 자리 주변 정리하기\n• 아침독서하기",
      class:"• 가방 문 닫기\n• 연필 한 자루, 지우개 하나 꺼내기\n• 바른 자세로 앉기\n• 선생님 말씀 경청하기",
      break:"• 책상 정리하기\n• 물 떠오기 / 화장실 가기\n• 연필 깎기\n• 다음 시간 교과서 꺼내기",
      lunch:"• 책상 위 정리하기\n• 의자 넣고 손 씻기"
    };

    const DEFAULT_LUNCH_ACTIVITIES={
      "월요일":"교실놀이",
      "화요일":"바깥놀이",
      "수요일":"위클래스",
      "목요일":"바깥놀이",
      "금요일":"바깥놀이"
    };

    const TAB_NAME_TO_TYPE={
      "아침시간":"morning",
      "아침활동":"morning",
      "수업시간":"class",
      "쉬는시간":"break",
      "점심시간":"lunch"
    };

    let DASHBOARD={
      headerLines:[],
      periods:[],
      notices:{...DEFAULT_NOTICE},
      lunchActivities:{...DEFAULT_LUNCH_ACTIVITIES},
      officeCode:"",
      schoolCode:""
    };

    let currentTab="";
    let fontSize=parseInt(localStorage.getItem("dashFontSize")||"64",10);
    let userEdits=JSON.parse(localStorage.getItem("userEdits")||"{}");
    let manualTabOverride=false;
    let lastAutoTabType="";
    let isInitialLoad=true;

    function parseCsv(text){
      const rows=[]; let row=[], cell="", inQuotes=false;
      for(let i=0;i<text.length;i++){
        const ch=text[i], next=text[i+1];
        if(ch==='"'){
          if(inQuotes&&next==='"'){ cell+='"'; i++; } else { inQuotes=!inQuotes; }
        } else if(ch===","&&!inQuotes){
          row.push(cell); cell="";
        } else if((ch==="\n"||ch==="\r")&&!inQuotes){
          if(ch==="\r"&&next==="\n") i++;
          row.push(cell); rows.push(row); row=[]; cell="";
        } else {
          cell+=ch;
        }
      }
      if(cell.length>0||row.length>0){ row.push(cell); rows.push(row); }
      return rows.map(r=>r.map(c=>(c||"").trim()));
    }

    async function fetchCsv(url){
      const res=await fetch(url);
      if(!res.ok) throw new Error("CSV 불러오기 실패");
      return parseCsv(await res.text());
    }

    function findCell(rows, keyword){
      for(let r=0;r<rows.length;r++){
        for(let c=0;c<rows[r].length;c++){
          if((rows[r][c]||"").trim()===keyword) return {r,c};
        }
      }
      return null;
    }

    function normalizeTime(value){
      if(!value) return "";
      const str=String(value).trim();
      const match=str.match(/^(\d{1,2}):(\d{1,2})$/);
      if(!match) return str;
      return `${match[1].padStart(2,"0")}:${match[2].padStart(2,"0")}`;
    }

    function toMinutes(timeStr){
      const [h,m]=timeStr.split(":").map(Number);
      return h*60+m;
    }

    function getTypeFromLabel(label){
      if(label.includes("아침")) return "morning";
      if(label.includes("점심")) return "lunch";
      if(label.includes("쉬는")) return "break";
      if(label.includes("예비")) return "break";
      return "class";
    }

    function extractPeriods(rows){
      const header=findCell(rows,"교시");
      if(!header) return [];
      const periods=[]; let r=header.r+1;
      while(r<rows.length){
        const label=(rows[r][header.c]||"").trim();
        const start=normalizeTime(rows[r][header.c+1]||"");
        const end=normalizeTime(rows[r][header.c+2]||"");
        if(!label||!start||!end) break;
        periods.push({label,start,end,type:getTypeFromLabel(label)});
        r++;
      }
      return periods;
    }

    function extractSchoolCodes(rows){
      const office=findCell(rows,"교육청코드"), school=findCell(rows,"학교코드");
      return {
        officeCode:office?(rows[office.r][office.c+1]||"").trim():"",
        schoolCode:school?(rows[school.r][school.c+1]||"").trim():""
      };
    }

    function extractHeaderLines(rows){
      const found=[], keywords=["우리가 만난지","여름방학까지","학교에 와요","학교와요","출근해야 합니다"];
      for(const row of rows){
        for(const cell of row){
          const text=(cell||"").trim();
          if(!text) continue;
          if(keywords.some(k=>text.includes(k))&&!found.includes(text)) found.push(text);
        }
      }
      return found.slice(0,2);
    }

    function extractNotices(rows){
      const notices={...DEFAULT_NOTICE};
      for(const row of rows){
        const key=(row[0]||"").trim();
        const value=(row[1]||"").trim();
        const type=TAB_NAME_TO_TYPE[key];
        if(type&&value) notices[type]=value;
      }
      return notices;
    }

    function extractLunchActivities(rows){
      const result={...DEFAULT_LUNCH_ACTIVITIES};
      for(let r=0;r<rows.length-1;r++){
        const currentRow=rows[r].map(v=>(v||"").trim());
        const nextRow=rows[r+1].map(v=>(v||"").trim());
        const hasWeekdays=currentRow.includes("월요일")&&currentRow.includes("화요일")&&currentRow.includes("수요일")&&currentRow.includes("목요일")&&currentRow.includes("금요일");
        if(!hasWeekdays) continue;
        ["월요일","화요일","수요일","목요일","금요일"].forEach(day=>{
          const idx=currentRow.indexOf(day);
          if(idx>-1&&nextRow[idx]) result[day]=nextRow[idx];
        });
        return result;
      }
      return result;
    }

    function renderHeader(){
      const lines=DASHBOARD.headerLines.length?DASHBOARD.headerLines:["우리반 대시보드","오늘도 좋은 하루 보내요."];
      document.getElementById("sheetData").innerHTML=lines.join("<br>");
    }

    function getTodayLunchActivity(){
      const dayMap={1:"월요일",2:"화요일",3:"수요일",4:"목요일",5:"금요일"};
      const dayName=dayMap[new Date().getDay()];
      return dayName?(DASHBOARD.lunchActivities[dayName]||"점심시간 활동"):"점심시간 활동";
    }

    function buildLunchNotice(rawText){
      const base=(rawText||DEFAULT_NOTICE.lunch).split("\n").map(v=>v.trim()).filter(Boolean);
      return [`🔔${getTodayLunchActivity()}`,...base].join("\n");
    }

    function getNoticeTextByType(type){
      const text=DASHBOARD.notices[type]||DEFAULT_NOTICE[type]||"";
      return type==="lunch"?buildLunchNotice(text):text;
    }

    function selectTab(type, isManual=true){
      if(isManual) manualTabOverride=true;
      currentTab=type;
      document.querySelectorAll(".tab-btn").forEach(btn=>btn.classList.toggle("active", btn.id===`btn-${type}`));
      const input=document.getElementById("noticeInput");
      input.value=userEdits[type]!==undefined?userEdits[type]:getNoticeTextByType(type);
    }

    function adjustFont(delta){
      fontSize+=delta;
      if(fontSize<28) fontSize=28;
      if(fontSize>100) fontSize=100;
      document.getElementById("noticeInput").style.fontSize=fontSize+"px";
      document.getElementById("currentSize").innerText=fontSize;
      localStorage.setItem("dashFontSize", String(fontSize));
    }

    document.getElementById("noticeInput").addEventListener("input", e=>{
      userEdits[currentTab]=e.target.value;
      localStorage.setItem("userEdits", JSON.stringify(userEdits));
    });

    function formatDisplayTime(date){
      const hour=date.getHours()%12||12;
      const minute=date.getMinutes();
      return `${hour}시 ${minute}분`;
    }

    function findCurrentPeriod(nowMinutes){
      return DASHBOARD.periods.find(p=>{
        const start=toMinutes(p.start), end=toMinutes(p.end);
        return nowMinutes>=start&&nowMinutes<end;
      })||null;
    }

    function findNextPeriod(nowMinutes){
      for(const p of DASHBOARD.periods){
        const start=toMinutes(p.start);
        if(nowMinutes<start) return p;
      }
      return null;
    }

    function updateTime(){
      const now=new Date();
      const nowMinutes=now.getHours()*60+now.getMinutes();
      const days=["일요일","월요일","화요일","수요일","목요일","금요일","토요일"];

      document.getElementById("dateText").textContent=`${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}`;

      const current=findCurrentPeriod(nowMinutes);
      const next=findNextPeriod(nowMinutes);
      const statusLineEl=document.getElementById("statusLine");
      const countdownEl=document.getElementById("countdownText");

      if(current){
        const currentEnd=toMinutes(current.end);
        const remain=currentEnd-nowMinutes;

        statusLineEl.innerHTML=current.type==="class"
          ? `<span class="accent">${current.label}</span>${formatDisplayTime(now)}`
          : `${current.label} ${formatDisplayTime(now)}`;

        countdownEl.innerHTML=current.label.includes("5교시")
          ? `마칠때까지 <span class="accent">${remain}분</span> 남았습니다.`
          : `${next ? next.label : "다음 일과"}까지 <span class="accent">${remain}분</span> 남았습니다.`;

        if(lastAutoTabType!==current.type){
          manualTabOverride=false;
          lastAutoTabType=current.type;
          selectTab(current.type,false);
        }

        isInitialLoad=false;
        return;
      }

      if(next){
        const remain=toMinutes(next.start)-nowMinutes;
        statusLineEl.textContent=formatDisplayTime(now);
        countdownEl.innerHTML=`${next.label}까지 <span class="accent">${remain}분</span> 남았습니다.`;

        if(isInitialLoad){
          lastAutoTabType="morning";
          selectTab("morning",false);
          isInitialLoad=false;
        }
        return;
      }

      statusLineEl.textContent=formatDisplayTime(now);
      countdownEl.textContent="오늘 일과가 끝났습니다.";

      if(isInitialLoad){
        lastAutoTabType="morning";
        selectTab("morning",false);
        isInitialLoad=false;
      }
    }

    async function fetchMeal(){
      const mealEl=document.getElementById("mealList");

      if(!DASHBOARD.officeCode||!DASHBOARD.schoolCode){
        mealEl.textContent="오늘 급식을 불러올 수 없습니다.";
        return;
      }

      try{
        const now=new Date();
        const ymd=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,"0")}${String(now.getDate()).padStart(2,"0")}`;
        const apiUrl=`https://open.neis.go.kr/hub/mealServiceDietInfo?Type=json&ATPT_OFCDC_SC_CODE=${encodeURIComponent(DASHBOARD.officeCode)}&SD_SCHUL_CODE=${encodeURIComponent(DASHBOARD.schoolCode)}&MLSV_YMD=${ymd}`;
        const res=await fetch(apiUrl);
        const data=await res.json();
        const row=data?.mealServiceDietInfo?.[1]?.row?.[0];

        if(!row?.DDISH_NM){
          mealEl.textContent="오늘 급식을 불러올 수 없습니다.";
          return;
        }

        const clean=row.DDISH_NM
          .replace(/<br\/?>/gi,"\n")
          .split("\n")
          .map(v=>v.trim())
          .filter(Boolean)
          .map(v=>v.replace(/\s*\(([\d.\s]+)\)\s*$/g,"").trim())
          .filter(v=>!v.includes("우유(급식)"))
          .join("\n");

        mealEl.textContent=clean||"오늘 급식을 불러올 수 없습니다.";
      } catch(e){
        mealEl.textContent="오늘 급식을 불러올 수 없습니다.";
      }
    }

    async function loadDashboardData(){
      try{
        const [basicRows, noticeRows]=await Promise.all([fetchCsv(BASIC_INFO_URL), fetchCsv(NOTICE_URL)]);

        DASHBOARD.periods=extractPeriods(basicRows);
        DASHBOARD.headerLines=extractHeaderLines(basicRows);
        DASHBOARD.notices=extractNotices(noticeRows);
        DASHBOARD.lunchActivities=extractLunchActivities(noticeRows);

        const codes=extractSchoolCodes(basicRows);
        DASHBOARD.officeCode=codes.officeCode;
        DASHBOARD.schoolCode=codes.schoolCode;

        renderHeader();
        adjustFont(0);
        updateTime();
        fetchMeal();
      } catch(e){
        document.getElementById("sheetData").innerHTML="데이터를 불러올 수 없습니다.";
        document.getElementById("mealList").textContent="오늘 급식을 불러올 수 없습니다.";
      }
    }

    loadDashboardData();
    setInterval(updateTime,1000);
    setInterval(fetchMeal,10*60*1000);
  </script>
</body>
</html>
