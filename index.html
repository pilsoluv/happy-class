<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>우리반 대시보드 FINAL</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    :root { --white: #ffffff; --black: #1a1a1a; --yellow: #ffca1b; --accent-red: #ff6b6b; }
    * { box-sizing: border-box; font-family: "Pretendard", sans-serif; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; color: var(--white); background: #0a2a63 url("wallpaper.jpg") center center / cover no-repeat fixed; }
    
    body { padding: 40px 60px; display: flex; flex-direction: column; }

    /* 1페이지 전용 헤더 (선생님이 좋다고 하신 간격 버전) */
    .header-p1 { display: grid; grid-template-columns: 1fr 1fr; align-items: flex-start; margin-bottom: 20px; }
    .header-left { font-size: 48px; font-weight: 800; line-height: 1.2; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); letter-spacing: -1px; }
    .header-right { text-align: right; font-size: 56px; font-weight: 900; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); position: relative; z-index: 10; }
    .time-wrap { text-align: right; margin-top: -20px; }
    .clock-text { font-size: 110px; font-weight: 950; letter-spacing: -3px; line-height: 1; }
    .clock-text span { color: var(--yellow); font-size: 70px; margin-right: 15px; }
    .countdown-msg { font-size: 36px; font-weight: 800; color: var(--yellow); margin-top: 5px; }

    /* 카드 스타일 */
    .glass-card { background: white; border-radius: 35px; color: var(--black); box-shadow: 0 20px 60px rgba(0,0,0,0.4); overflow: hidden; display: flex; flex-direction: column; }

    /* 1페이지 메인 구성 */
    .view-page { display: none; height: 100%; }
    .view-page.active { display: grid; }
    .p1-grid { grid-template-columns: 1.2fr 0.8fr; gap: 40px; height: calc(100vh - 380px); }
    .tab-container { display: flex; background: #f1f3f5; padding: 12px; gap: 10px; }
    .tab-btn { flex: 1; padding: 18px; border: none; background: transparent; color: #adb5bd; font-weight: 800; cursor: pointer; border-radius: 18px; font-size: 24px; }
    .tab-btn.active { background: #0a2a63; color: var(--white); }
    .notice-input { width: 100%; height: 100%; border: none; outline: none; padding: 45px; font-weight: 800; resize: none; line-height: 1.6; font-size: 48px; }

    /* 2페이지 메인 구성 (상단 비우기) */
    .p2-layout { display: flex; flex-direction: column; height: 100%; gap: 25px; }
    .p2-header { display: flex; justify-content: center; align-items: center; position: relative; padding: 20px 0; }
    .p2-date-nav { font-size: 65px; font-weight: 950; color: white; display: flex; align-items: center; gap: 40px; text-shadow: 3px 3px 6px rgba(0,0,0,0.6); }
    .p2-date-nav span { cursor: pointer; color: var(--yellow); padding: 0 15px; }
    .p2-font-ctrl { position: absolute; right: 0; display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.3); padding: 10px 20px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.3); }
    .size-btn { border: none; background: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-weight: 900; font-size: 24px; color: #0a2a63; }
    
    .p2-card { flex: 1; min-height: 500px; }
    .p2-textarea { width: 100%; height: 100%; border: none; outline: none; padding: 60px; font-weight: 800; resize: none; line-height: 1.4; }

    /* 학생 그리드 */
    .student-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
    .student-item { padding: 22px 5px; background: white; border-radius: 15px; color: var(--black); font-size: 24px; font-weight: 800; text-align: center; cursor: pointer; box-shadow: 0 6px 12px rgba(0,0,0,0.2); }
    .student-item.checked { background: var(--accent-red); color: white; }

    /* 하단 버튼 */
    .util-container { position: fixed; bottom: 40px; right: 40px; display: flex; gap: 15px; }
    .util-btn { width: 65px; height: 65px; background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.5); color: white; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
  </style>
</head>
<body>

  <header class="header-p1" id="p1Header">
    <div class="header-left" id="sheetData">로딩 중...</div>
    <div class="header-right">
      <div id="p1Date"></div>
      <div class="time-wrap">
        <div class="clock-text"><span id="p1Period"></span><span id="p1Time"></span></div>
        <div class="countdown-msg" id="p1Countdown"></div>
      </div>
    </div>
  </header>

  <main id="page1" class="view-page active">
    <div class="p1-grid">
      <section class="glass-card">
        <div class="tab-container">
          <button class="tab-btn" id="btn-morning" onclick="selectTab('morning')">아침활동</button>
          <button class="tab-btn" id="btn-class" onclick="selectTab('class')">수업시간</button>
          <button class="tab-btn" id="btn-break" onclick="selectTab('break')">쉬는시간</button>
          <button class="tab-btn" id="btn-lunch" onclick="selectTab('lunch')">점심시간</button>
        </div>
        <textarea id="noticeInput" class="notice-input"></textarea>
      </section>
      <section class="glass-card" style="align-items: center; justify-content: center; padding: 50px;">
        <div style="font-size: 65px; font-weight: 900; color: #0a2a63; margin-bottom: 40px; border-bottom: 8px solid var(--yellow); padding-bottom: 10px;">오늘의 급식 🍱</div>
        <div id="mealList" style="font-size: 42px; font-weight: 800; text-align: center; color: #333; line-height: 1.8;">정보를 가져오는 중...</div>
      </section>
    </div>
  </main>

  <main id="page2" class="view-page">
    <div class="p2-layout">
      <div class="p2-header">
        <div class="p2-date-nav">
          <span onclick="changeDate(-1)">&lt;</span>
          <div id="p2DateDisplay"></div>
          <span onclick="changeDate(1)">&gt;</span>
        </div>
        <div class="p2-font-ctrl">
          <button class="size-btn" onclick="adjFont(-5)">-</button>
          <span id="curSize" style="color:white; font-weight:800; width:40px; text-align:center; font-size:22px;">48</span>
          <button class="size-btn" onclick="adjFont(5)">+</button>
        </div>
      </div>
      <section class="glass-card p2-card">
        <textarea class="p2-textarea" id="boardMemo" placeholder="여기에 알림장을 입력하세요."></textarea>
      </section>
      <div class="student-grid" id="studentList"></div>
    </div>
  </main>

  <div class="util-container">
    <button class="util-btn" onclick="toggleFS()"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg></button>
    <button class="util-btn" onclick="switchPg()"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m11 17-5-5 5-5m6 10 5-5-5-5"/></svg></button>
  </div>

  <script>
    const students = ["김민채", "김아준", "민예린", "송유하", "신서울", "신수호", "안동윤", "안동은", "안시윤", "오준서", "윤노아", "이도희", "이유나", "이은서", "전민서", "조우준", "최민국", "최승효", "황민영", "황슬아", "김세아"];
    const PERIODS = [
      { name: "아침활동", start: "08:30", end: "08:59", type: "morning" },
      { name: "1교시", start: "09:00", end: "09:39", type: "class" },
      { name: "쉬는시간", start: "09:40", end: "09:49", type: "break" },
      { name: "2교시", start: "09:50", end: "10:29", type: "class" },
      { name: "3교시", start: "10:40", end: "11:19", type: "class" },
      { name: "점심시간", start: "11:20", end: "12:19", type: "lunch" }
    ];

    let viewingDate = new Date();
    let currentTab = "";

    function init() {
      const listWrap = document.getElementById('studentList');
      students.forEach(name => {
        const div = document.createElement('div');
        div.className = 'student-item';
        div.innerText = name;
        div.onclick = () => div.classList.toggle('checked');
        listWrap.appendChild(div);
      });
      loadBoardData();
      updateTime();
      fetchSheet();
      setInterval(updateTime, 1000);
      adjFont(0);
    }

    function updateTime() {
      const now = new Date();
      const h = now.getHours(); const m = now.getMinutes();
      const total = h * 60 + m;
      const days = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];
      const dateStr = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}`;
      
      document.getElementById("p1Date").innerText = dateStr;
      
      // 2페이지 날짜는 changeDate에서 따로 관리하므로 실시간 업데이트는 1페이지 위주로
      if(document.getElementById('page1').classList.contains('active')) {
          document.getElementById("p2DateDisplay").innerText = dateStr;
      }

      document.getElementById("p1Time").innerText = `${h % 12 || 12}시 ${m < 10 ? '0'+m : m}분`;

      const p = PERIODS.find(p => {
        const [sh, sm] = p.start.split(":").map(Number);
        const [eh, em] = p.end.split(":").map(Number);
        return total >= (sh * 60 + sm) && total <= (eh * 60 + em);
      });

      const labelEl = document.getElementById("p1Period");
      const countEl = document.getElementById("p1Countdown");

      if (p) {
        labelEl.innerText = p.name;
        const [eh, em] = p.end.split(":").map(Number);
        countEl.innerText = `${p.type === 'class' ? '쉬는시간' : '수업시간'}까지 ${ (eh*60+em) - total }분 남았습니다.`;
        if(!currentTab) selectTab(p.type);
      } else {
        labelEl.innerText = "";
        countEl.innerText = "";
        if(!currentTab) selectTab("morning");
      }
    }

    function changeDate(delta) {
      viewingDate.setDate(viewingDate.getDate() + delta);
      const days = ["일", "월", "화", "수", "목", "금", "토"];
      document.getElementById("p2DateDisplay").innerText = `${viewingDate.getFullYear()}.${viewingDate.getMonth()+1}.${viewingDate.getDate()} (${days[viewingDate.getDay()]})`;
      loadBoardData();
    }

    function loadBoardData() {
      const key = viewingDate.toISOString().split('T')[0];
      document.getElementById("boardMemo").value = localStorage.getItem('memo_' + key) || "";
    }

    document.getElementById("boardMemo").addEventListener("input", (e) => {
      const key = viewingDate.toISOString().split('T')[0];
      localStorage.setItem('memo_' + key, e.target.value);
    });

    let fontSize = parseInt(localStorage.getItem('boardFS') || '48');
    function adjFont(d) {
      fontSize += d;
      document.getElementById("boardMemo").style.fontSize = fontSize + "px";
      document.getElementById("curSize").innerText = fontSize;
      localStorage.setItem('boardFS', fontSize);
    }

    function selectTab(type) {
      currentTab = type;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.id === `btn-${type}`));
      document.getElementById("noticeInput").value = JSON.parse(localStorage.getItem('userEdits') || '{}')[type] || "";
    }

    document.getElementById("noticeInput").addEventListener("input", (e) => {
      let edits = JSON.parse(localStorage.getItem('userEdits') || '{}');
      edits[currentTab] = e.target.value;
      localStorage.setItem('userEdits', JSON.stringify(edits));
    });

    async function fetchSheet() {
      const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSh0ND1N2lqnfgek8TE1vO0gztHKWsfcLif7tilCzh_Ibkau0i33CcKrfQGCu7n2rrRQDqYoCvsEIk/pub?gid=1958992156&single=true&output=csv";
      try {
        const res = await fetch(url);
        const data = await res.text();
        const rows = data.split('\n').map(r => r.split(','));
        document.getElementById("sheetData").innerHTML = `${rows[0][0]}<br>${rows[1][0]}`;
      } catch (e) {}
    }

    function toggleFS() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
    
    function switchPg() { 
      const p1 = document.getElementById('page1');
      const p2 = document.getElementById('page2');
      const h1 = document.getElementById('p1Header');
      if(p1.classList.contains('active')) {
        p1.classList.remove('active'); h1.style.display = 'none'; p2.classList.add('active');
        // 2페이지로 갈 때 현재 날짜로 초기화
        viewingDate = new Date();
        changeDate(0);
      } else {
        p2.classList.remove('active'); h1.style.display = 'grid'; p1.classList.add('active');
      }
    }
    
    init();
  </script>
</body>
</html>
