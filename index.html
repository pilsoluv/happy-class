<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>교실 대시보드</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    :root { --white:#ffffff; --black:#1a1a1a; --yellow:#ffca1b; --navy:#0a2a63; --bg-card:rgba(255,255,255,0.92); --header-left-size:42px; --header-right-size:56px; --tab-size:22px; --memo-size:48px; --memo-padding:34px; --status-size:108px; }
    * { box-sizing:border-box; font-family:"Pretendard",sans-serif; }
    html,body { margin:0; width:100%; height:100%; overflow:hidden; color:var(--white); background:#0a2a63 url("wallpaper.jpg") center center / cover no-repeat fixed; }
    /* 바닥 빨간 선에 맞추기 위해 하단 패딩 제거 */
    body { padding: 22px 34px 0px 34px; } 

    .page { display:grid; grid-template-columns:1.16fr 0.84fr; grid-template-rows:auto 1fr; column-gap:28px; row-gap:0px; height:100%; }
    .header-left { grid-column:1; grid-row:1; font-size:52px; font-weight:850; line-height:1.24; text-shadow:2px 2px 4px rgba(0,0,0,0.45); white-space:pre-line; padding-bottom:10px; }
    .header-right { grid-column:2; grid-row:1; text-align:center; font-size:54px; font-weight:900; text-shadow:2px 2px 4px rgba(0,0,0,0.45); line-height:1.0; padding-top:40px; }
    
    .glass-card { background:var(--bg-card); border-radius:28px 28px 0 0; color:var(--black); box-shadow:0 14px 36px rgba(0,0,0,0.22); overflow:hidden; border:none; backdrop-filter:blur(2px); }
    
    /* 1페이지 알림장 박스: 하단 밀착 */
    .notice-section { grid-column:1; grid-row:2; display:flex; flex-direction:column; min-height:0; height:100%; margin-top:10px; }
    .tab-container { display:flex; background:#f7f7f8; padding:10px; gap:8px; border-bottom:1px solid rgba(0,0,0,0.06); align-items:center; }
    .tab-btn { flex:1; min-width:0; padding:14px 10px; border:none; background:transparent; color:#b5bbc4; font-weight:800; cursor:pointer; border-radius:14px; font-size:var(--tab-size); transition:0.2s; }
    .tab-btn.active { background:var(--navy); color:var(--white); }
    .font-control { display:flex; align-items:center; gap:8px; background:#eceff2; padding:5px 14px; border-radius:22px; margin-left:auto; }
    .size-btn { width:34px; height:34px; border-radius:50%; border:2px solid #ced4da; background:white; color:#495057; cursor:pointer; font-size:20px; display:flex; align-items:center; justify-content:center; }
    .notice-content { flex:1; min-height:0; padding:24px 34px 28px 34px; }
    .notice-input { width:100%; height:100%; background:transparent; border:none; outline:none; color:var(--black); font-weight:800; resize:none; line-height:1.5; font-size:var(--memo-size); }

    /* 우측 시각 영역 상단으로 바짝 올림 */
    .main-right { grid-column:2; grid-row:2; display:grid; grid-template-rows:auto 1fr; gap:0px; min-height:0; height:100%; }
    .time-wrap { text-align:center; padding-top:0px; margin-top:-20px; margin-bottom:15px; }
    .status-line { font-size:108px; font-weight:950; letter-spacing:-3px; white-space:nowrap; line-height:1.0; text-shadow:3px 3px 8px rgba(0,0,0,0.45); }
    .status-line .accent { color:var(--yellow); margin-right:18px; }
    .countdown { font-size:40px; font-weight:800; margin-top:0px; line-height:1.0; text-shadow:2px 2px 5px rgba(0,0,0,0.45); }
    
    /* 급식 카드: 하단 밀착 */
    .meal-card { min-height:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px 18px 26px 18px; height:100%; }
    .meal-title { font-size:48px; font-weight:900; margin-bottom:12px; color:var(--navy); border-bottom:5px solid var(--yellow); padding-bottom:8px; line-height:1; }
    .meal-list { font-size:58px; font-weight:800; line-height:1.22; text-align:center; color:#333; white-space:pre-line; }

    .floating-controls { position:fixed; right:18px; bottom:18px; display:flex; flex-direction:column; gap:10px; z-index:50; }
    .floating-btn { width:52px; height:52px; border:none; border-radius:50%; background:rgba(255,255,255,0.92); color:#14284e; box-shadow:0 8px 24px rgba(0,0,0,0.25); display:flex; align-items:center; justify-content:center; cursor:pointer; }
    
    .screen-page { display:none; width:100%; height:100%; }
    .screen-page.active { display:block; }

    /* 2페이지 설정 */
    .page2 { display:grid; grid-template-rows:1.4fr 1fr; gap:20px; height:100%; padding:20px 80px 0px 40px; }
    .page2-top { min-height:0; }
    .notice-board { width:100%; height:100%; background:rgba(255,255,255,0.93); border-radius:30px 30px 0 0; color:#111; box-shadow:0 14px 36px rgba(0,0,0,0.22); padding:25px; display:flex; flex-direction:column; }
    .notice-board-header { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; min-height:60px; border-bottom:2px solid rgba(0,0,0,0.08); padding-bottom:10px; }
    .notice-date-text { font-size:46px; font-weight:900; color:#0a2a63; text-align:center; white-space:nowrap; }
    
    /* 알림장 줄간격 확대 (line-height: 1.6) */
    .notice-board-textarea { flex:1; width:100%; border:none; outline:none; resize:none; background:transparent; font-size:92px; line-height:1.6; font-weight:700; color:#000; padding:20px 10px; }
    
    .page2-bottom { display:grid; grid-template-columns:repeat(7, 180px); gap:12px; padding:20px 0; align-content:center; justify-content:start; }
    .student-btn { border:none; border-radius:14px; min-height:85px; background:rgba(255,255,255,0.95); color:#000; font-size:38px; font-weight:950; cursor:pointer; box-shadow:0 6px 18px rgba(0,0,0,0.15); width:100%; }
  </style>
</head>
<body>
  <div id="screen1" class="screen-page active">
    <div class="page">
      <div class="header-left" id="sheetData">데이터 로딩 중...</div>
      <div class="header-right" id="dateText"></div>
      <section class="glass-card notice-section">
        <div class="tab-container">
          <button class="tab-btn" id="btn-morning" onclick="selectTab('morning')">아침활동</button>
          <button class="tab-btn" id="btn-class" onclick="selectTab('class')">수업시간</button>
          <button class="tab-btn" id="btn-break" onclick="selectTab('break')">쉬는시간</button>
          <button class="tab-btn" id="btn-lunch" onclick="selectTab('lunch')">점심시간</button>
          <div class="font-control">
            <button class="size-btn" onclick="adjustFont(-4)">-</button>
            <span id="currentSize" style="color:#495057; font-weight:800; margin:0 4px;">48</span>
            <button class="size-btn" onclick="adjustFont(4)">+</button>
          </div>
        </div>
        <div class="notice-content"><textarea id="noticeInput" class="notice-input"></textarea></div>
      </section>
      <div class="main-right">
        <div class="time-wrap">
          <div class="status-line" id="statusLine"></div>
          <div id="countdownText" class="countdown"></div>
        </div>
        <section class="glass-card meal-card">
          <div class="meal-title">오늘의 급식 🍱</div>
          <div id="mealList" class="meal-list">식단 정보를 가져오는 중...</div>
        </section>
      </div>
    </div>
  </div>
  <div id="screen2" class="screen-page">
    <div class="page2">
      <div class="page2-top">
        <section class="notice-board">
          <div class="notice-board-header">
            <div></div>
            <div class="notice-date-wrap" style="display:flex; align-items:center; gap:22px;">
              <button style="border:none; background:transparent; color:#9a9a9a; font-size:60px; cursor:pointer;" onclick="changeNoticeDate(-1)">‹</button>
              <div id="noticeDateText" class="notice-date-text"></div>
              <button style="border:none; background:transparent; color:#9a9a9a; font-size:60px; cursor:pointer;" onclick="changeNoticeDate(1)">›</button>
            </div>
            <div class="notice-font-control">
              <button class="notice-font-btn" style="width:34px; height:34px; border-radius:50%; border:2px solid #ced4da; background:white; cursor:pointer;" onclick="adjustPage2Font(-8)">-</button>
              <span id="page2FontSizeText" style="color:#495057; font-weight:800; margin:0 10px;">92</span>
              <button class="notice-font-btn" style="width:34px; height:34px; border-radius:50%; border:2px solid #ced4da; background:white; cursor:pointer;" onclick="adjustPage2Font(8)">+</button>
            </div>
          </div>
          <textarea id="dailyNoticeInput" class="notice-board-textarea" placeholder="알림장을 입력하세요"></textarea>
        </section>
      </div>
      <div id="studentGrid" class="page2-bottom"></div>
    </div>
  </div>
  <div class="floating-controls">
    <button class="floating-btn" onclick="togglePage()">↔</button>
    <button class="floating-btn" onclick="toggleFullscreen()">⛶</button>
  </div>

  <script>
    /* 스크립트 로직 (이전 답변과 동일하게 유지하여 기능을 보존합니다) */
    // ... (이전 코드의 script 부분 복사 붙여넣기)
  </script>
</body>
</html>
