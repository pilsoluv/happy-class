<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>우리반 대시보드</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <style>
        :root { --yellow: #ffca1b; --white: #ffffff; }
        * { box-sizing: border-box; font-family: "Pretendard", sans-serif; margin: 0; padding: 0; }
        body { 
            background: #0a2a63 url('wallpaper.jpg') no-repeat center center/cover; 
            height: 100vh; padding: 40px 60px; color: var(--white); overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* 헤더: 시트정보 & 날짜/시간 */
        header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
        .sheet-info { font-size: 32px; font-weight: 700; line-height: 1.4; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .date-time-zone { text-align: right; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .today-date { font-size: 40px; font-weight: 800; margin-bottom: 5px; }
        .status-line { font-size: 100px; font-weight: 900; line-height: 1; letter-spacing: -2px; }
        .status-line .period { color: var(--yellow); margin-right: 20px; }
        .countdown-msg { font-size: 40px; font-weight: 800; margin-top: 10px; }
        .countdown-msg span { color: var(--yellow); }

        /* 메인 레이아웃 */
        main { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 40px; flex: 1; min-height: 0; }
        .glass-card { background: rgba(255, 255, 255, 0.95); border-radius: 30px; color: #1a1a1a; overflow: hidden; display: flex; flex-direction: column; }

        /* 탭 스타일 */
        .tab-menu { display: flex; background: #f1f3f5; padding: 10px; gap: 10px; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; font-size: 22px; font-weight: 800; color: #adb5bd; cursor: pointer; border-radius: 15px; }
        .tab-btn.active { background: #0a2a63; color: white; }
        .tab-content { flex: 1; padding: 40px; font-size: 42px; font-weight: 800; line-height: 1.6; }
        .tab-content textarea { width: 100%; height: 100%; border: none; outline: none; resize: none; font-size: inherit; font-weight: inherit; }

        /* 급식 박스 */
        .meal-box { padding: 40px; text-align: center; justify-content: center; }
        .meal-title { font-size: 50px; font-weight: 900; color: #0a2a63; margin-bottom: 20px; border-bottom: 6px solid var(--yellow); display: inline-block; }
        .meal-list { font-size: 38px; font-weight: 800; color: #333; line-height: 1.8; }
    </style>
</head>
<body>

    <header>
        <div class="sheet-info" id="sheetInfo">
            <p>데이터 로딩 중...</p>
        </div>
        <div class="date-time-zone">
            <div class="today-date" id="todayDate"></div>
            <div class="status-line" id="statusLine">
                <span class="period" id="period">교시</span><span id="currentTime">0시 00분</span>
            </div>
            <div class="countdown-msg" id="countdownText"></div>
        </div>
    </header>

    <main>
        <section class="glass-card">
            <div class="tab-menu">
                <button class="tab-btn" id="tab-morning" onclick="selectTab('morning')">아침활동</button>
                <button class="tab-btn" id="tab-class" onclick="selectTab('class')">수업시간</button>
                <button class="tab-btn" id="tab-break" onclick="selectTab('break')">쉬는시간</button>
                <button class="tab-btn" id="tab-lunch" onclick="selectTab('lunch')">점심시간</button>
            </div>
            <div class="tab-content">
                <textarea id="noticeInput" placeholder="공지사항을 입력하세요."></textarea>
            </div>
        </section>

        <section class="glass-card meal-box">
            <div class="meal-title">오늘의 급식 🍱</div>
            <div id="mealList" class="meal-list">식단 정보를 가져오는 중...</div>
        </section>
    </main>

    <script>
        // 1. 구글 시트 데이터 가져오기 (주신 CSV 주소 사용)
        async function fetchSheet() {
            const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSh0ND1N2lqnfgek8TE1vO0gztHKWsfcLif7tilCzh_Ibkau0i33CcKrfQGCu7n2rrRQDqYoCvsEIk/pub?gid=1958992156&single=true&output=csv";
            try {
                const res = await fetch(url);
                const data = await res.text();
                const rows = data.split('\n').map(row => row.split(','));
                document.getElementById('sheetInfo').innerHTML = `<p>${rows[0][0]}</p><p>${rows[1][0]}</p>`;
            } catch (e) { console.error("시트 로드 실패"); }
        }

        // 4, 5. 시간 로직 및 카운트다운
        function updateTime() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            const total = h * 60 + m;

            // 날짜 표시
            const days = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];
            document.getElementById("todayDate").innerText = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}`;

            // 12시간제 표시
            const displayH = h % 12 || 12;
            const displayM = m < 10 ? '0'+m : m;
            document.getElementById("currentTime").innerText = `${displayH}시 ${displayM}분`;

            let period = ""; let goalName = ""; let targetTime = 0;

            // 시정표 로직 (선생님 요청 반영)
            if (total < 520) { period="등교"; goalName="아침활동"; targetTime=520; }
            else if (total < 540) { period="아침활동"; goalName="1교시"; targetTime=540; }
            else if (total < 580) { period="1교시"; goalName="쉬는시간"; targetTime=580; }
            else if (total < 590) { period="쉬는시간"; goalName="2교시"; targetTime=590; }
            else if (total < 630) { period="2교시"; goalName="쉬는시간"; targetTime=630; }
            else if (total < 640) { period="쉬는시간"; goalName="3교시"; targetTime=640; }
            else if (total < 680) { period="3교시"; goalName="점심시간"; targetTime=680; }
            else if (total < 740) { period="점심시간"; goalName="4교시"; targetTime=740; }
            else if (total < 780) { period="4교시"; goalName="쉬는시간"; targetTime=780; }
            else if (total < 790) { period="쉬는시간"; goalName="5교시"; targetTime=790; }
            else if (total < 830) { period="5교시"; goalName="하교"; targetTime=830; }

            document.getElementById("period").innerText = period;
            
            const countdownEl = document.getElementById("countdownText");
            if (total < 830) {
                const remain = targetTime - total;
                countdownEl.innerHTML = `<span>${goalName}</span>까지 <span>${remain}분</span> 남았습니다.`;
            } else {
                countdownEl.innerText = ""; // 1시 50분 이후 빈칸
            }
        }

        // 2. 탭 선택 기능
        function selectTab(type) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${type}`).classList.add('active');
            // 로컬 스토리지 저장/불러오기
            const saved = JSON.parse(localStorage.getItem('tabData') || '{}');
            document.getElementById('noticeInput').value = saved[type] || "";
            document.getElementById('noticeInput').oninput = (e) => {
                saved[type] = e.target.value;
                localStorage.setItem('tabData', JSON.stringify(saved));
            };
        }

        // 초기 실행
        fetchSheet();
        updateTime();
        setInterval(updateTime, 1000);
        selectTab('morning'); // 기본탭
    </script>
</body>
</html>
