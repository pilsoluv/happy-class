<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>교실 대시보드</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    :root { --white: #ffffff; --black: #1a1a1a; --yellow: #ffca1b; --bg-card: rgba(255, 255, 255, 1); }
    * { box-sizing: border-box; font-family: "Pretendard", sans-serif; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; color: var(--white); background: #0a2a63 url("wallpaper.jpg") center center / cover no-repeat fixed; }
    body { padding: 40px 60px; }
    .page { display: grid; grid-template-columns: 1.1fr 0.9fr; grid-template-rows: auto 1fr; gap: 40px; height: 100%; }
    .header-left { grid-column: 1; font-size: 34px; font-weight: 800; line-height: 1.4; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    .header-right { grid-column: 2; text-align: right; font-size: 56px; font-weight: 900; margin-bottom: -15px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    .glass-card { background: var(--bg-card); border-radius: 30px; color: var(--black); box-shadow: 0 15px 50px rgba(0,0,0,0.4); overflow: hidden; border: none; }
    .notice-section { grid-row: 2; display: flex; flex-direction: column; position: relative; }
    .tab-container { display: flex; background: #f8f9fa; padding: 12px; gap: 8px; border-bottom: 2px solid #eee; align-items: center; }
    .tab-btn { flex: 1; padding: 16px; border: none; background: transparent; color: #adb5bd; font-weight: 800; cursor: pointer; border-radius: 15px; font-size: 24px; transition: 0.2s; }
    .tab-btn.active { background: #0a2a63; color: var(--white); }
    .font-control { display: flex; align-items: center; gap: 10px; background: #e9ecef; padding: 6px 18px; border-radius: 25px; margin-left: auto; }
    .size-btn { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #ced4da; background: white; color: #495057; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; }
    .notice-content { flex-grow: 1; padding: 50px; }
    .notice-input { width: 100%; height: 100%; background: transparent; border: none; outline: none; color: var(--black); font-weight: 800; resize: none; line-height: 1.6; font-size: 48px; }
    .main-right { grid-row: 2; display: flex; flex-direction: column; gap: 30px; }
    .time-wrap { text-align: right; padding: 0; margin-top: -15px; }
    .status-line { font-size: 115px; font-weight: 950; letter-spacing: -3px; white-space: nowrap; line-height: 1.0; text-shadow: 3px 3px 8px rgba(0,0,0,0.5); }
    .status-line .accent { color: var(--yellow); margin-right: 25px; }
    .countdown { font-size: 42px; font-weight: 800; margin-top: 15px; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
    .meal-card { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
    .meal-title { font-size: 52px; font-weight: 900; margin-bottom: 30px; color: #0a2a63; border-bottom: 5px solid var(--yellow); padding-bottom: 5px; }
    .meal-list { font-size: 34px; font-weight: 800; line-height: 1.8; text-align: center; color: #333; }
  </style>
</head>
<body>
  <div class="page">
    <div class="header-left" id="sheetData">데이터 로딩 중...</div>
    <div class="header-right" id="dateText"></div>
    <section class="glass-card notice-section">
      <div class="tab-container">
        <button class="tab-btn" id="btn-morning" onclick="selectTab('morning')">아침활동</button>
        <button class="tab-btn" id="btn-class" onclick="selectTab('class')">수업시간</button>
        <button class="tab-btn" id="btn-break" onclick="selectTab('break')">쉬는시간</button>
        <button class="tab-btn" id="btn-lunch" onclick="selectTab('lunch')">점심시간</button>
        <div class="font-control">
          <button class="size-btn" onclick="adjustFont(-4)">-</button>
          <span id="currentSize" style="color:#495057; font-weight:800; margin:0 5px;">48</span>
          <button class="size-btn" onclick="adjustFont(4)">+</button>
        </div>
      </div>
      <div class="notice-content"><textarea id="noticeInput" class="notice-input"></textarea></div>
    </section>
    <div class="main-right">
      <div class="time-wrap">
        <div class="status-line" id="statusLine"></div>
        <div id="countdownText" class="countdown"></div>
      </div>
      <section class="glass-card meal-card">
        <div class="meal-title">오늘의 급식 🍱</div>
        <div id="mealList" class="meal-list">식단 정보를 가져오는 중...</div>
      </section>
    </div>
  </div>
  <script>
    /* 이전 스크립트 로직 유지 */
    const MEMO_DEFAULTS = { morning: "• 핸드폰 전원 꺼서 가방에 넣기\n• 우체통과 알림장 확인하기\n• 자리 주변 정리하기\n• 아침독서하기", class: "• 가방 문 닫기\n• 연필 한 자루, 지우개 하나\n• 바른 자세로 앉기\n• 선생님 말씀 경청하기", break: "• 책상 정리하기\n• 물 떠오기 / 화장실 가기\n• 연필 깎기\n• 다음 시간 교과서 꺼내기", lunch: "" };
    const LUNCH_DAY = { 1: "교실놀이", 2: "바깥놀이", 3: "위클래스", 4: "바깥놀이", 5: "바깥놀이" };
    const PERIODS = [
      { name: "아침활동", start: "08:30", end: "08:59", type: "morning" },
      { name: "1교시", start: "09:00", end: "09:39", type: "class" },
      { name: "쉬는시간", start: "09:40", end: "09:49", type: "break" },
      { name: "2교시", start: "09:50", end: "10:29", type: "class" },
      { name: "쉬는시간", start: "10:30", end: "10:39", type: "break" },
      { name: "3교시", start: "10:40", end: "11:19", type: "class" },
      { name: "점심시간", start: "11:20", end: "12:19", type: "lunch" },
      { name: "4교시", start: "12:20", end: "12:59", type: "class" },
      { name: "5교시", start: "13:10", end: "13:49", type: "class" }
    ];
    let currentTab = ""; let isInitialLoad = true;
    let fontSize = parseInt(localStorage.getItem('dashFontSize') || '48');
    let userEdits = JSON.parse(localStorage.getItem('userEdits') || '{}');
    function selectTab(type) {
      currentTab = type; document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.id === `btn-${type}`));
      const input = document.getElementById("noticeInput");
      if (userEdits[type] !== undefined) { input.value = userEdits[type]; }
      else { if (type === 'lunch') { let day = new Date().getDay(); if (day === 0 || day === 6) day = 1; input.value = "★ " + (LUNCH_DAY[day] || "자유활동") + "\n• 책상 위 정리하기\n• 의자 넣고 손 씻기"; } else { input.value = MEMO_DEFAULTS[type] || ""; } }
    }
    function adjustFont(delta) { fontSize += delta; document.getElementById("noticeInput").style.fontSize = fontSize + "px"; document.getElementById("currentSize").innerText = fontSize; localStorage.setItem('dashFontSize', fontSize); }
    document.getElementById("noticeInput").addEventListener("input", (e) => { userEdits[currentTab] = e.target.value; localStorage.setItem('userEdits', JSON.stringify(userEdits)); });
    function updateTime() {
      const now = new Date(); const h = now.getHours(); const m = now.getMinutes(); const total = h * 60 + m;
      const days = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];
      document.getElementById("dateText").textContent = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 ${days[now.getDay()]}`;
      const displayH = h % 12 || 12; const displayM = m < 10 ? '0' + m : m; const displayTime = `${displayH}시 ${displayM}분`;
      const period = PERIODS.find(p => { const [sh, sm] = p.start.split(":").map(Number); const [eh, em] = p.end.split(":").map(Number); return total >= (sh * 60 + sm) && total <= (eh * 60 + em); });
      const statusLineEl = document.getElementById("statusLine"); const countdownEl = document.getElementById("countdownText");
      if (total >= 830) { statusLineEl.innerHTML = displayTime; countdownEl.innerHTML = ""; if (isInitialLoad) { selectTab("morning"); isInitialLoad = false; } }
      else if (period) {
        statusLineEl.innerHTML = `<span class="accent">${period.name}</span> ${displayTime}`;
        const [eh, em] = period.end.split(":").map(Number); const remain = (eh * 60 + em) - total;
        countdownEl.innerHTML = `${period.type === 'class' ? '쉬는시간' : '수업시작'}까지 <span style="color:#ffca1b">${remain}분</span> 남았습니다.`;
        if (isInitialLoad) { selectTab(period.type); isInitialLoad = false; }
      } else { statusLineEl.innerHTML = displayTime; countdownEl.innerHTML = "즐거운 일과 시간입니다."; if (isInitialLoad) { selectTab("morning"); isInitialLoad = false; } }
    }
    async function fetchSheet() {
      const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSh0ND1N2lqnfgek8TE1vO0gztHKWsfcLif7tilCzh_Ibkau0i33CcKrfQGCu7n2rrRQDqYoCvsEIk/pub?gid=1958992156&single=true&output=csv";
      try { const res = await fetch(url); const data = await res.text(); const rows = data.split('\n').map(r => r.split(',')); document.getElementById("sheetData").innerHTML = `${rows[0][0]}<br>${rows[1][0]}`; }
      catch (e) { document.getElementById("sheetData").innerText = "데이터 로딩 오류"; }
    }
    adjustFont(0); updateTime(); fetchSheet();
    setInterval(updateTime, 1000); setInterval(fetchSheet, 60000);
  </script>
</body>
</html>
