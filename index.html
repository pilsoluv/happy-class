<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>교실 대시보드</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    :root { 
      --white:#ffffff; --black:#1a1a1a; --yellow:#ffca1b; --navy:#0a2a63; 
      --bg-card:rgba(255,255,255,0.92); --header-left-size:42px; --header-right-size:56px; 
      --tab-size:22px; --memo-size:48px; --status-size:108px; 
    }
    * { box-sizing:border-box; font-family:"Pretendard",sans-serif; }
    html,body { margin:0; width:100%; height:100%; overflow:hidden; color:var(--white); background:#0a2a63 url("wallpaper.jpg") center center / cover no-repeat fixed; }
    
    /* 하단 빨간 선 밀착을 위해 바닥 패딩 제거 */
    body { padding: 22px 34px 0px 34px; }

    /* --- 공통 스타일 --- */
    .screen-page { display:none; width:100%; height:100%; }
    .screen-page.active { display:block; }
    .glass-card { background:var(--bg-card); border-radius:28px 28px 0 0; color:var(--black); box-shadow:0 14px 36px rgba(0,0,0,0.22); border:none; backdrop-filter:blur(2px); overflow:hidden; }

    /* --- 1페이지 레이아웃 --- */
    .page1 { display:grid; grid-template-columns:1.16fr 0.84fr; grid-template-rows:auto 1fr; column-gap:28px; height:100%; }
    .header-left { grid-column:1; grid-row:1; font-size:52px; font-weight:850; line-height:1.24; text-shadow:2px 2px 4px rgba(0,0,0,0.45); white-space:pre-line; padding-bottom:10px; }
    .header-right { grid-column:2; grid-row:1; text-align:center; font-size:54px; font-weight:900; text-shadow:2px 2px 4px rgba(0,0,0,0.45); line-height:1.0; padding-top:40px; }
    .notice-section { grid-column:1; grid-row:2; display:flex; flex-direction:column; height:100%; margin-top:10px; }
    .main-right { grid-column:2; grid-row:2; display:flex; flex-direction:column; height:100%; }
    
    /* 1페이지 시각 영역: 상단 밀착 */
    .time-wrap { text-align:center; margin-top:-20px; margin-bottom:15px; }
    .status-line { font-size:108px; font-weight:950; letter-spacing:-3px; line-height:1.0; text-shadow:3px 3px 8px rgba(0,0,0,0.45); }
    .status-line .accent { color:var(--yellow); margin-right:18px; }
    .countdown { font-size:40px; font-weight:800; text-shadow:2px 2px 5px rgba(0,0,0,0.45); }
    .meal-card { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px 18px 26px 18px; }

    /* --- 2페이지 레이아웃 --- */
    .page2 { display:flex; flex-direction:column; height:100%; padding-right:80px; }
    .page2-header { text-align:center; padding-top:20px; margin-bottom:10px; }
    .page2-date-wrap { display:inline-flex; align-items:center; gap:22px; }
    .page2-date-text { font-size:54px; font-weight:900; text-shadow:2px 2px 4px rgba(0,0,0,0.45); }
    .date-arrow { border:none; background:transparent; color:rgba(255,255,255,0.7); font-size:50px; cursor:pointer; }

    /* 2페이지 알림장 박스 */
    .page2-notice-card { flex:1.4; margin-bottom:15px; display:flex; flex-direction:column; }
    .notice-board-textarea { flex:1; width:100%; border:none; outline:none; resize:none; background:transparent; font-size:92px; font-weight:700; color:#000; padding:30px 40px; line-height:1.7; }

    /* 2페이지 학생 버튼 박스 */
    .page2-student-card { flex:1; padding:20px 30px; display:grid; grid-template-columns:repeat(7, 1fr); gap:12px; align-content:start; justify-content:start; }
    .student-btn { border:none; border-radius:14px; min-height:80px; background:rgba(255,255,255,0.95); color:#000; font-size:36px; font-weight:950; cursor:pointer; box-shadow:0 6px 15px rgba(0,0,0,0.12); }

    /* 플로팅 컨트롤 */
    .floating-controls { position:fixed; right:18px; bottom:18px; display:flex; flex-direction:column; gap:10px; z-index:100; }
    .floating-btn { width:52px; height:52px; border:none; border-radius:50%; background:rgba(255,255,255,0.92); color:#14284e; box-shadow:0 8px 24px rgba(0,0,0,0.25); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:20px; }
  </style>
</head>
<body>

  <div id="screen1" class="screen-page active">
    <div class="page1">
      <div class="header-left" id="sheetData">데이터 로딩 중...</div>
      <div class="header-right" id="dateText"></div>
      <section class="glass-card notice-section">
        <div id="tabs" style="display:flex; background:#f7f7f8; padding:10px; gap:8px;">
          <button class="tab-btn active" id="btn-morning" onclick="selectTab('morning')" style="flex:1; padding:14px; border:none; border-radius:14px; font-weight:800; font-size:22px; cursor:pointer;">아침활동</button>
          <button class="tab-btn" id="btn-class" onclick="selectTab('class')" style="flex:1; padding:14px; border:none; border-radius:14px; font-weight:800; font-size:22px; cursor:pointer;">수업시간</button>
          <button class="tab-btn" id="btn-break" onclick="selectTab('break')" style="flex:1; padding:14px; border:none; border-radius:14px; font-weight:800; font-size:22px; cursor:pointer;">쉬는시간</button>
          <button class="tab-btn" id="btn-lunch" onclick="selectTab('lunch')" style="flex:1; padding:14px; border:none; border-radius:14px; font-weight:800; font-size:22px; cursor:pointer;">점심시간</button>
        </div>
        <div style="flex:1; padding:24px;"><textarea id="noticeInput" style="width:100%; height:100%; border:none; outline:none; font-size:48px; font-weight:800; line-height:1.5; resize:none;"></textarea></div>
      </section>
      <div class="main-right">
        <div class="time-wrap">
          <div class="status-line" id="statusLine"></div>
          <div id="countdownText" class="countdown"></div>
        </div>
        <section class="glass-card meal-card">
          <div style="font-size:48px; font-weight:900; color:var(--navy); border-bottom:5px solid var(--yellow); margin-bottom:12px;">오늘의 급식 🍱</div>
          <div id="mealList" style="font-size:54px; font-weight:800; text-align:center; color:#333; white-space:pre-line;">식단 정보를 가져오는 중...</div>
        </section>
      </div>
    </div>
  </div>

  <div id="screen2" class="screen-page">
    <div class="page2">
      <div class="page2-header">
        <div class="page2-date-wrap">
          <button class="date-arrow" onclick="changeNoticeDate(-1)">‹</button>
          <div id="noticeDateText" class="page2-date-text"></div>
          <button class="date-arrow" onclick="changeNoticeDate(1)">›</button>
        </div>
      </div>
      <section class="glass-card page2-notice-card">
        <textarea id="dailyNoticeInput" class="notice-board-textarea" placeholder="알림장을 입력하세요"></textarea>
      </section>
      <section class="glass-card page2-student-card" id="studentGrid"></section>
    </div>
  </div>

  <div class="floating-controls">
    <button class="floating-btn" onclick="togglePage()">↔</button>
    <button class="floating-btn" onclick="toggleFullscreen()">⛶</button>
  </div>

  <script>
    const BASIC_INFO_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQidILWyuflvuPJcl_yZGj5nAs6fVNaWXGUQAwzycSegpqo7UuHhEYYQIjOzRam-w8b2-yao3YmIYxi/pub?gid=0&single=true&output=csv";
    const NOTICE_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQidILWyuflvuPJcl_yZGj5nAs6fVNaWXGUQAwzycSegpqo7UuHhEYYQIjOzRam-w8b2-yao3YmIYxi/pub?gid=1154495982&single=true&output=csv";
    const SETTING_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQidILWyuflvuPJcl_yZGj5nAs6fVNaWXGUQAwzycSegpqo7UuHhEYYQIjOzRam-w8b2-yao3YmIYxi/pub?gid=1102807175&single=true&output=csv";
    
    let DASHBOARD={ headerLines:[], periods:[], notices:{}, students:[], officeCode:"", schoolCode:"" };
    let currentScreen=1, page2DateOffset=0;
    let userEdits=JSON.parse(localStorage.getItem("userEdits")||"{}");

    function parseCsv(t){ return t.split('\n').map(row => row.split(',').map(cell => cell.trim().replace(/^"|"$/g, ''))); }
    async function fetchCsv(u){ const r=await fetch(u); return parseCsv(await r.text()); }

    function selectTab(t){
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.id===`btn-${t}`));
      document.getElementById("noticeInput").value = userEdits[t] || (DASHBOARD.notices[t] || "");
    }

    document.getElementById("noticeInput").addEventListener("input", e => {
      const activeTab = document.querySelector(".tab-btn.active").id.replace("btn-", "");
      userEdits[activeTab] = e.target.value;
      localStorage.setItem("userEdits", JSON.stringify(userEdits));
    });

    function updateTime(){
      const now=new Date(), days=["일요일","월요일","화요일","수요일","목요일","금요일","토요일"];
      const dateStr = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}`;
      document.getElementById("dateText").textContent = dateStr;
      document.getElementById("noticeDateText").textContent = dateStr; // 기본값
      
      const h=now.getHours()%12||12, m=String(now.getMinutes()).padStart(2,"0");
      document.getElementById("statusLine").innerHTML = `<span class="accent">${h}시 ${m}분</span>`;
      document.getElementById("countdownText").textContent = "오늘 일과가 끝났습니다.";
    }

    function togglePage(){
      currentScreen = currentScreen === 1 ? 2 : 1;
      document.getElementById("screen1").classList.toggle("active", currentScreen===1);
      document.getElementById("screen2").classList.toggle("active", currentScreen===2);
      if(currentScreen===2) { loadDailyNotice(); renderStudentGrid(); }
    }

    function loadDailyNotice(){
      const d=new Date(); d.setDate(d.getDate()+page2DateOffset);
      const k=`dailyNotice_${d.toISOString().split('T')[0]}`;
      document.getElementById("noticeDateText").textContent = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
      document.getElementById("dailyNoticeInput").value = localStorage.getItem(k) || "";
    }

    document.getElementById("dailyNoticeInput").addEventListener("input", e => {
      const d=new Date(); d.setDate(d.getDate()+page2DateOffset);
      localStorage.setItem(`dailyNotice_${d.toISOString().split('T')[0]}`, e.target.value);
    });

    function changeNoticeDate(n){ page2DateOffset+=n; loadDailyNotice(); renderStudentGrid(); }

    function renderStudentGrid(){
      const g=document.getElementById("studentGrid"); g.innerHTML="";
      DASHBOARD.students.forEach(s => {
        const b=document.createElement("button"); b.className="student-btn"; b.textContent=s;
        b.onclick=()=> { b.style.background = b.style.background.includes("rgb(255, 202, 27)") ? "" : "#ffca1b"; };
        g.appendChild(b);
      });
    }

    async function init(){
      try {
        const [b, n] = await Promise.all([fetchCsv(BASIC_INFO_URL), fetchCsv(NOTICE_URL)]);
        DASHBOARD.headerLines = [b[0][0], b[1][0]];
        DASHBOARD.students = b.slice(1).map(r => r[4]).filter(Boolean);
        document.getElementById("sheetData").innerHTML = DASHBOARD.headerLines.join("<br>");
        updateTime(); renderStudentGrid(); selectTab('morning');
      } catch(e){ console.error(e); }
    }

    init(); setInterval(updateTime, 1000);
    async function toggleFullscreen(){ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
  </script>
</body>
</html>
