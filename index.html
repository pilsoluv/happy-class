<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>교실 대시보드</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    :root { --white:#ffffff; --black:#1a1a1a; --yellow:#ffca1b; --navy:#0a2a63; --bg-card:rgba(255,255,255,0.92); --header-left-size:42px; --header-right-size:56px; --tab-size:22px; --memo-size:48px; --memo-padding:34px; --status-size:108px; }
    * { box-sizing:border-box; font-family:"Pretendard",sans-serif; }
    html,body { margin:0; width:100%; height:100%; overflow:hidden; color:var(--white); background:#0a2a63 url("wallpaper.jpg") center center / cover no-repeat fixed; }
    body { padding:22px 34px 26px 34px; }

    /* (1페이지) */
/* 전체 레이아웃 */

.layout{
display:grid;
grid-template-columns:58% 42%;
grid-template-rows:auto 1fr;
grid-template-areas:
"leftHeader rightHeader"
"leftMain rightMain";
gap:20px 26px;
height:100%;
}


/* 상단 */

.header-left{
grid-area:leftHeader;
font-size:52px;
font-weight:900;
line-height:1.2;
}

.header-right{
grid-area:rightHeader;
text-align:center;
font-size:54px;
font-weight:900;
}


/* 왼쪽 메모 */

.notice-section{
grid-area:leftMain;
display:flex;
flex-direction:column;
height:100%;
}

.notice-content{
flex:1;
padding:28px 34px;
}

.notice-input{
width:100%;
height:100%;
border:none;
resize:none;
font-size:54px;
font-weight:800;
}


/* 오른쪽 */

.right-panel{
grid-area:rightMain;
display:grid;
grid-template-rows:120px 1fr;
gap:14px;
height:100%;
}

.time-box{
text-align:center;
}

.status-line{
font-size:108px;
font-weight:900;
}

.countdown{
font-size:40px;
font-weight:800;
}


/* 급식 */

.meal-card{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
}

.meal-title{
font-size:46px;
font-weight:900;
margin-bottom:10px;
}

.meal-list{
font-size:34px;
line-height:1.3;
text-align:center;
}


/* 2페이지 */

.page2{
display:grid;
grid-template-rows:1fr 380px;
gap:20px;
height:100%;
}


/* 알림장 */

.notice-board{
display:flex;
flex-direction:column;
padding:16px;
}

.notice-board-textarea{
flex:1;
font-size:86px;
border:none;
resize:none;
}


/* 학생 영역 */

.student-area{
padding-top:50px;
}


/* 학생 그리드 */

.student-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:18px 20px;
}


/* 학생 버튼 */

.student-btn{
min-height:78px;
font-size:36px;
border-radius:14px;
}

    @media (max-width:1400px){
      .notice-date-text { font-size:28px; }
      .notice-board-textarea { font-size:58px; }
      .student-btn { font-size:26px; min-height:58px; }
    }
  </style>
</head>
<body>

<div id="screen1" class="screen-page active">

<div class="layout">

  <!-- 왼쪽 상단 -->
  <div class="header-left" id="sheetData"></div>

  <!-- 오른쪽 상단 -->
  <div class="header-right" id="dateText"></div>

  <!-- 왼쪽 메인 -->
  <section class="notice-section glass-card">

    <div class="tab-container">

      <button class="tab-btn" id="btn-morning" onclick="selectTab('morning')">아침활동</button>
      <button class="tab-btn" id="btn-class" onclick="selectTab('class')">수업시간</button>
      <button class="tab-btn" id="btn-break" onclick="selectTab('break')">쉬는시간</button>
      <button class="tab-btn" id="btn-lunch" onclick="selectTab('lunch')">점심시간</button>

      <div class="font-control">
        <button class="size-btn" onclick="adjustFont(-4)">-</button>
        <span id="currentSize">48</span>
        <button class="size-btn" onclick="adjustFont(4)">+</button>
      </div>

    </div>

    <div class="notice-content">
      <textarea id="noticeInput" class="notice-input"></textarea>
    </div>

  </section>


  <!-- 오른쪽 메인 -->
  <div class="right-panel">

    <div class="time-box">

      <div id="statusLine" class="status-line"></div>
      <div id="countdownText" class="countdown"></div>

    </div>

    <section class="meal-card glass-card">

      <div class="meal-title">오늘의 급식 🍱</div>
      <div id="mealList" class="meal-list"></div>

    </section>

  </div>

</div>
</div>



<div id="screen2" class="screen-page">

<div class="page2">

  <section class="notice-board">

    <div class="notice-board-header">

      <div></div>

      <div class="notice-date-wrap">
        <button class="date-arrow" onclick="changeNoticeDate(-1)">‹</button>
        <div id="noticeDateText" class="notice-date-text"></div>
        <button class="date-arrow" onclick="changeNoticeDate(1)">›</button>
      </div>

      <div class="notice-font-control">
        <button class="notice-font-btn" onclick="adjustPage2Font(-8)">-</button>
        <span id="page2FontSizeText">76</span>
        <button class="notice-font-btn" onclick="adjustPage2Font(8)">+</button>
      </div>

    </div>

    <textarea id="dailyNoticeInput" class="notice-board-textarea"></textarea>

  </section>


  <div class="student-area">

    <div id="studentGrid" class="student-grid"></div>

  </div>

</div>
</div>

</body>

  <div id="floatingControls" class="floating-controls">
    <button class="floating-btn" title="페이지 전환" onclick="togglePage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 8 4 12 9 16"></polyline>
        <polyline points="15 8 20 12 15 16"></polyline>
      </svg>
    </button>
    <button class="floating-btn" title="전체화면" onclick="toggleFullscreen()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3H5a2 2 0 0 0-2 2v3"/>
        <path d="M16 3h3a2 2 0 0 1 2 2v3"/>
        <path d="M8 21H5a2 2 0 0 1-2-2v-3"/>
        <path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
      </svg>
    </button>
  </div>

  <script>
    // (시트주소)
    const BASIC_INFO_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQidILWyuflvuPJcl_yZGj5nAs6fVNaWXGUQAwzycSegpqo7UuHhEYYQIjOzRam-w8b2-yao3YmIYxi/pub?gid=0&single=true&output=csv";
    const NOTICE_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQidILWyuflvuPJcl_yZGj5nAs6fVNaWXGUQAwzycSegpqo7UuHhEYYQIjOzRam-w8b2-yao3YmIYxi/pub?gid=1154495982&single=true&output=csv";
    const SETTING_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQidILWyuflvuPJcl_yZGj5nAs6fVNaWXGUQAwzycSegpqo7UuHhEYYQIjOzRam-w8b2-yao3YmIYxi/pub?gid=1102807175&single=true&output=csv";

    // (메모기본값)
    const DEFAULT_NOTICE={ morning:"• 핸드폰 전원 꺼서 가방에 넣기\n• 우체통과 알림장 확인하기\n• 자리 주변 정리하기\n• 아침독서하기", class:"• 가방 문 닫기\n• 연필 한 자루, 지우개 하나\n• 바른 자세로 앉기\n• 선생님 말씀 경청하기", break:"• 책상 정리하기\n• 물 떠오기 / 화장실 가기\n• 연필 깎기\n• 다음 시간 교과서 꺼내기", lunch:"• 책상 위 정리하기\n• 의자 넣고 손 씻기" };
    const DEFAULT_LUNCH_ACTIVITIES={ "월요일":"교실놀이", "화요일":"바깥놀이", "수요일":"위클래스", "목요일":"바깥놀이", "금요일":"바깥놀이" };
    const TAB_NAME_TO_TYPE={ "아침시간":"morning", "아침활동":"morning", "수업시간":"class", "쉬는시간":"break", "점심시간":"lunch" };
    const SETTING_KEY_MAP={ "왼쪽문구 크기":"--header-left-size", "날짜 크기":"--header-right-size", "탭 글자 크기":"--tab-size", "메모장 크기":"--memo-size", "메모장 여백":"--memo-padding", "현재시각 크기":"--status-size" };

    // (상태값)
    let DASHBOARD={ headerLines:[], periods:[], notices:{ ...DEFAULT_NOTICE }, lunchActivities:{ ...DEFAULT_LUNCH_ACTIVITIES }, officeCode:"", schoolCode:"", students:[] };
    let currentTab="", isInitialLoad=true, currentScreen=1, page2DateOffset=0;
    let userEdits=JSON.parse(localStorage.getItem("userEdits")||"{}");
    let fontSize=parseInt(localStorage.getItem("dashFontSize")||"48",10);
    let page2FontSize=parseInt(localStorage.getItem("page2FontSize")||"76",10);
    let manualTabOverride = false;
    let lastAutoTabType = "";

    // (유틸)
    function parseCsv(text){ const rows=[]; let row=[], cell="", inQuotes=false; for(let i=0;i<text.length;i++){ const char=text[i], next=text[i+1]; if(char==='"'){ if(inQuotes&&next==='"'){ cell+='"'; i++; } else { inQuotes=!inQuotes; } } else if(char===","&&!inQuotes){ row.push(cell); cell=""; } else if((char==="\n"||char==="\r")&&!inQuotes){ if(char==="\r"&&next==="\n") i++; row.push(cell); rows.push(row); row=[]; cell=""; } else { cell+=char; } } if(cell.length>0||row.length>0){ row.push(cell); rows.push(row); } return rows.map(r=>r.map(c=>(c||"").trim())); }
    async function fetchCsv(url){ const res=await fetch(url); if(!res.ok) throw new Error(`CSV 불러오기 실패: ${url}`); return parseCsv(await res.text()); }
    function normalizeTime(value){ if(!value) return ""; const str=String(value).trim(); const match=str.match(/^(\d{1,2}):(\d{1,2})$/); if(!match) return str; return `${match[1].padStart(2,"0")}:${match[2].padStart(2,"0")}`; }
    function toMinutes(timeStr){ const [h,m]=timeStr.split(":").map(Number); return h*60+m; }
    function getTypeFromLabel(label){ if(label.includes("아침")) return "morning"; if(label.includes("점심")) return "lunch"; if(label.includes("쉬는")) return "break"; return "class"; }
    function findCell(rows,keyword){ for(let r=0;r<rows.length;r++){ for(let c=0;c<rows[r].length;c++){ if((rows[r][c]||"").trim()===keyword) return {r,c}; } } return null; }

    // (기본정보) 상단 문구 2줄 추출
    function collectHeaderLines(rows){
      const found=[], keywords=["우리가 만난지","학교에 와요",];
      for(const row of rows){ for(const cell of row){ const text=(cell||"").trim(); if(!text) continue; if(keywords.some(keyword=>text.includes(keyword))&&!found.includes(text)) found.push(text); } }
      return found.slice(0,2);
    }

    // (기본정보) 시간표 / 코드 / 학생명단
    function extractPeriods(rows){ const header=findCell(rows,"교시"); if(!header) return []; const periods=[]; let r=header.r+1; while(r<rows.length){ const label=(rows[r][header.c]||"").trim(), start=normalizeTime(rows[r][header.c+1]||""), end=normalizeTime(rows[r][header.c+2]||""); if(!label||!start||!end) break; periods.push({ label, start, end, type:getTypeFromLabel(label) }); r++; } return periods; }
    function extractSchoolCodes(rows){ const office=findCell(rows,"교육청코드"), school=findCell(rows,"학교코드"); return { officeCode:office?(rows[office.r][office.c+1]||"").trim():"", schoolCode:school?(rows[school.r][school.c+1]||"").trim():"" }; }
    function extractStudents(rows){ const target=findCell(rows,"학생명단"); if(!target) return []; const students=[]; let r=target.r+1; while(r<rows.length){ const name=(rows[r][target.c]||"").trim(); if(!name) break; students.push(name); r++; } return students; }

    // (안내사항) 안내문 / 점심활동
    function extractNotices(rows){ const notices={ ...DEFAULT_NOTICE }; for(const row of rows){ const key=(row[0]||"").trim(), value=(row[1]||"").trim(), type=TAB_NAME_TO_TYPE[key]; if(type&&value) notices[type]=value; } return notices; }
    function extractLunchActivities(rows){ const result={ ...DEFAULT_LUNCH_ACTIVITIES }; for(let r=0;r<rows.length-1;r++){ const currentRow=rows[r].map(v=>(v||"").trim()), nextRow=rows[r+1].map(v=>(v||"").trim()); const hasWeekdays=currentRow.includes("월요일")&&currentRow.includes("화요일")&&currentRow.includes("수요일")&&currentRow.includes("목요일")&&currentRow.includes("금요일"); if(!hasWeekdays) continue; ["월요일","화요일","수요일","목요일","금요일"].forEach(day=>{ const idx=currentRow.indexOf(day); if(idx>-1&&nextRow[idx]) result[day]=nextRow[idx]; }); return result; } return result; }

    // (설정)
    function applySettings(rows){ const root=document.documentElement; for(let i=1;i<rows.length;i++){ const key=(rows[i][0]||"").trim(), value=(rows[i][1]||"").trim(), cssVar=SETTING_KEY_MAP[key]; if(cssVar&&value){ if(key==="카드 투명도"){ const opacity=Math.max(0,Math.min(1,parseFloat(value))); root.style.setProperty("--bg-card",`rgba(255,255,255,${opacity})`); } else { root.style.setProperty(cssVar,`${parseFloat(value)}px`); } } } }

    // (점심안내)
    function getTodayLunchActivity(){ const dayMap={1:"월요일",2:"화요일",3:"수요일",4:"목요일",5:"금요일"}, dayName=dayMap[new Date().getDay()]; return dayName?(DASHBOARD.lunchActivities[dayName]||"점심시간 활동"):"점심시간 활동"; }
    function buildLunchNotice(rawText){ const base=(rawText||DEFAULT_NOTICE.lunch).split("\n").map(v=>v.trim()).filter(Boolean); return [`🔔${getTodayLunchActivity()}`,...base].join("\n"); }
    function getNoticeTextByType(type){ const text=DASHBOARD.notices[type]||DEFAULT_NOTICE[type]||""; return type==="lunch"?buildLunchNotice(text):text; }

    // (1페이지 메모)
    function selectTab(type, isManual = true){
  if(isManual) manualTabOverride = true;
  currentTab = type;
  document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.toggle("active", btn.id === `btn-${type}`));
  const input = document.getElementById("noticeInput");
  input.value = userEdits[type] !== undefined ? userEdits[type] : getNoticeTextByType(type);
}
    function adjustFont(delta){ fontSize+=delta; if(fontSize<16) fontSize=16; document.getElementById("noticeInput").style.fontSize=fontSize+"px"; document.getElementById("currentSize").innerText=fontSize; localStorage.setItem("dashFontSize",String(fontSize)); }
    document.getElementById("noticeInput").addEventListener("input",e=>{ userEdits[currentTab]=e.target.value; localStorage.setItem("userEdits",JSON.stringify(userEdits)); });

    // (시간)
    function formatDisplayTime(date){ const rawHour=date.getHours(), hour12=rawHour%12||12, minute=date.getMinutes(); return `${hour12}시 ${minute}분`; }
    function findCurrentAndNextPeriod(nowMinutes){ const periods=DASHBOARD.periods; for(let i=0;i<periods.length;i++){ const current=periods[i], start=toMinutes(current.start), end=toMinutes(current.end); if(nowMinutes>=start&&nowMinutes<end) return { current, next:periods[i+1]||null, remain:end-nowMinutes }; } return null; }
    function findUpcomingPeriod(nowMinutes){ const periods=DASHBOARD.periods; for(const p of periods){ const start=toMinutes(p.start); if(nowMinutes<start) return { next:p, remain:start-nowMinutes }; } return null; }

    function updateTime(){
      const now=new Date(), nowMinutes=now.getHours()*60+now.getMinutes(), days=["일요일","월요일","화요일","수요일","목요일","금요일","토요일"];
      document.getElementById("dateText").textContent=`${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${days[now.getDay()]}`;
      const statusLineEl=document.getElementById("statusLine"), countdownEl=document.getElementById("countdownText"), currentInfo=findCurrentAndNextPeriod(nowMinutes);
      if(currentInfo){
        const {current,next,remain}=currentInfo;
        statusLineEl.innerHTML=`<span class="accent">${current.label}</span>${formatDisplayTime(now)}`;
        countdownEl.innerHTML=next?`${next.label}까지 <span style="color:#ffca1b">${remain}분</span> 남았습니다.`:`오늘 일과가 곧 마무리됩니다.`;
        if(lastAutoTabType !== current.type){
  manualTabOverride = false;
  lastAutoTabType = current.type;
  selectTab(current.type, false);
}
        isInitialLoad=false;
        return;
      }
      const upcomingInfo=findUpcomingPeriod(nowMinutes);
      if(upcomingInfo){
        statusLineEl.innerHTML=formatDisplayTime(now);
        countdownEl.innerHTML=`${upcomingInfo.next.label}까지 <span style="color:#ffca1b">${upcomingInfo.remain}분</span> 남았습니다.`;
        if(isInitialLoad){
  lastAutoTabType = "morning";
  selectTab("morning", false);
  isInitialLoad = false;
}
        return;
      }
      statusLineEl.innerHTML=formatDisplayTime(now);
      countdownEl.innerHTML="오늘 일과가 끝났습니다.";
      if(isInitialLoad){ selectTab("morning"); isInitialLoad=false; }
    }

    // (1페이지 화면)
    function renderHeader(){ const lines=DASHBOARD.headerLines.length?DASHBOARD.headerLines:["우리반 대시보드","오늘도 좋은 하루 보내요."]; document.getElementById("sheetData").innerHTML=lines.join("<br>"); }

    // (급식)
    async function fetchMeal(){
      const mealEl=document.getElementById("mealList");
      if(!DASHBOARD.officeCode||!DASHBOARD.schoolCode){ mealEl.textContent="학교 코드가 없어 급식을 불러올 수 없습니다."; return; }
      try{
        const now=new Date(), ymd=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,"0")}${String(now.getDate()).padStart(2,"0")}`;
        const apiUrl=`https://open.neis.go.kr/hub/mealServiceDietInfo?Type=json&ATPT_OFCDC_SC_CODE=${encodeURIComponent(DASHBOARD.officeCode)}&SD_SCHUL_CODE=${encodeURIComponent(DASHBOARD.schoolCode)}&MLSV_YMD=${ymd}`;
        const res=await fetch(apiUrl), data=await res.json(), row=data?.mealServiceDietInfo?.[1]?.row?.[0];
        if(!row?.DDISH_NM){ mealEl.textContent="오늘 급식 정보가 없습니다."; return; }

        const clean=row.DDISH_NM
          .replace(/<br\/?>/gi,"\n")
          .split("\n")
          .map(v=>v.trim())
          .filter(Boolean)
          .map(v=>v.replace(/\s*\(([\d.\s]+)\)\s*$/g,"").trim())
          .filter(v=>!v.includes("우유(급식)"))
          .join("\n");

        mealEl.textContent=clean||"오늘 급식 정보가 없습니다.";
      } catch(e){
        mealEl.textContent="급식 정보를 불러오지 못했습니다.";
      }
    }

    // (2페이지 날짜)
    function getNoticePageDate(){ const date=new Date(); date.setDate(date.getDate()+page2DateOffset); return date; }
    function formatFullDate(date){ const days=["일요일","월요일","화요일","수요일","목요일","금요일","토요일"]; return `${date.getFullYear()}년 ${date.getMonth()+1}월 ${date.getDate()}일 ${days[date.getDay()]}`; }
    function getDateKey(date){ return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`; }

    // (2페이지 알림장 저장)
    function loadDailyNotice(){
      const date=getNoticePageDate(), key=`dailyNotice_${getDateKey(date)}`, saved=localStorage.getItem(key)||"";
      document.getElementById("noticeDateText").textContent=formatFullDate(date);
      document.getElementById("dailyNoticeInput").value=saved;
    }
    function saveDailyNotice(){ const date=getNoticePageDate(), key=`dailyNotice_${getDateKey(date)}`; localStorage.setItem(key,document.getElementById("dailyNoticeInput").value); }
    function changeNoticeDate(delta){ saveDailyNotice(); page2DateOffset+=delta; loadDailyNotice(); renderStudentGrid(); }
    document.getElementById("dailyNoticeInput").addEventListener("input",saveDailyNotice);

    // (2페이지 글씨크기)
    function adjustPage2Font(delta){
      page2FontSize += delta;
      if(page2FontSize < 44) page2FontSize = 44;
      if(page2FontSize > 92) page2FontSize = 92;
      document.getElementById("dailyNoticeInput").style.fontSize = page2FontSize + "px";
      document.getElementById("page2FontSizeText").innerText = page2FontSize;
      localStorage.setItem("page2FontSize", String(page2FontSize));
    }

    // (2페이지 학생 체크 저장)
    function getCleaningKey(){ return `cleaning_${getDateKey(getNoticePageDate())}`; }
    function getCheckedStudents(){ return JSON.parse(localStorage.getItem(getCleaningKey())||"[]"); }
    function setCheckedStudents(arr){ localStorage.setItem(getCleaningKey(),JSON.stringify(arr)); }

    function toggleStudent(name){
      const checked=getCheckedStudents();
      const next=checked.includes(name)?checked.filter(v=>v!==name):[...checked,name];
      setCheckedStudents(next);
      renderStudentGrid();
    }

    // (2페이지 학생명단 렌더링)
    function renderStudentGrid(){
      const grid=document.getElementById("studentGrid"), checked=getCheckedStudents();
      grid.innerHTML="";
      DASHBOARD.students.forEach(name=>{
        const btn=document.createElement("button");
        btn.className=`student-btn${checked.includes(name)?" checked":""}`;
        btn.textContent=name;
        btn.onclick=()=>toggleStudent(name);
        grid.appendChild(btn);
      });
    }

    // (버튼)
    async function toggleFullscreen(){
      try{
        if(!document.fullscreenElement){ await document.documentElement.requestFullscreen(); }
        else { await document.exitFullscreen(); }
      } catch(e){ console.error(e); }
    }

    function togglePage(){
      if(currentScreen===2) saveDailyNotice();
      currentScreen=currentScreen===1?2:1;
      document.getElementById("screen1").classList.toggle("active",currentScreen===1);
      document.getElementById("screen2").classList.toggle("active",currentScreen===2);
      document.getElementById("floatingControls").classList.toggle("page2-mode", currentScreen===2);
      if(currentScreen===2){
        loadDailyNotice();
        renderStudentGrid();
        document.getElementById("dailyNoticeInput").style.fontSize = page2FontSize + "px";
        document.getElementById("page2FontSizeText").innerText = page2FontSize;
      }
    }

    // (초기화)
    async function loadDashboardData(){
      try{
        const [basicRows,noticeRows,settingRows]=await Promise.all([fetchCsv(BASIC_INFO_URL),fetchCsv(NOTICE_URL),fetchCsv(SETTING_URL)]);
        DASHBOARD.periods=extractPeriods(basicRows);
        DASHBOARD.headerLines=collectHeaderLines(basicRows);
        const codes=extractSchoolCodes(basicRows);
        DASHBOARD.officeCode=codes.officeCode;
        DASHBOARD.schoolCode=codes.schoolCode;
        DASHBOARD.students=extractStudents(basicRows);
        DASHBOARD.notices=extractNotices(noticeRows);
        DASHBOARD.lunchActivities=extractLunchActivities(noticeRows);
        applySettings(settingRows);
        renderHeader();

        const sheetMemoSize=getComputedStyle(document.documentElement).getPropertyValue("--memo-size").trim().replace("px","");
        if(!localStorage.getItem("dashFontSize")&&sheetMemoSize) fontSize=parseInt(sheetMemoSize,10);

        adjustFont(0);
        updateTime();
        fetchMeal();
        loadDailyNotice();
        renderStudentGrid();
        document.getElementById("dailyNoticeInput").style.fontSize = page2FontSize + "px";
        document.getElementById("page2FontSizeText").innerText = page2FontSize;
      } catch(e){
        console.error(e);
        document.getElementById("sheetData").innerHTML="시트 데이터를 불러오지 못했습니다.";
        document.getElementById("mealList").textContent="급식 정보를 불러오지 못했습니다.";
      }
    }

    // (시작)
    loadDashboardData();
    setInterval(updateTime,1000);
    setInterval(fetchMeal,10*60*1000);
  </script>
</body>
</html>
