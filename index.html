<style>
  :root{
    --bg:#0a2a63;
    --card-bg:rgba(255,255,255,0.92);
    --card-border:rgba(0,0,0,0.10);
    --text:#111;
    --white:#fff;
    --navy:#133a87;
    --yellow:#ffca1b;

    /* 모든 여백 기준 */
    --gutter:32px;      /* 왼쪽 바깥 = 가운데 = 오른쪽 바깥 */
    --row-gap:16px;     /* 위아래 간격 공통 */

    /* 열 비율 */
    --left-col:54fr;
    --right-col:46fr;

    /* 각 열 안 위/아래 높이 */
    --left-top-h:150px;
    --right-top-h:310px;

    --header-font:58px;
    --date-font:64px;
    --time-font:130px;
    --count-font:62px;
    --tab-font:22px;
  }

  *{box-sizing:border-box;font-family:"Pretendard",sans-serif;}
  html,body{margin:0;width:100%;height:100%;}
  body{
    background:var(--bg) url("wallpaper.jpg") center/cover no-repeat fixed;
    color:var(--white);
    overflow:hidden;
  }

  .accent{color:var(--yellow);font-weight:900;white-space:nowrap;}

  /* 바깥 패딩 제거: 여백은 .page 하나가 전부 담당 */
  .app{
    width:100%;
    height:100%;
    padding:0;
  }

  /* 핵심 구조 */
  .page{
    width:100%;
    height:100%;
    display:grid;
    grid-template-columns:var(--left-col) var(--right-col);
    column-gap:var(--gutter);
    padding:var(--gutter);
  }

  .col{
    min-height:0;
    display:grid;
    row-gap:var(--row-gap);
  }

  .left-col{
    grid-template-rows:var(--left-top-h) 1fr;
  }

  .right-col{
    grid-template-rows:var(--right-top-h) 1fr;
  }

  .card{
    min-height:0;
    width:100%;
    background:var(--card-bg);
    color:var(--text);
    border-radius:28px;
    border:2px solid var(--card-border);
    box-shadow:0 10px 28px rgba(0,0,0,0.12);
    overflow:hidden;
  }

  .header-card{
    padding:18px 0 0 0;
    margin-left:0;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    justify-content:flex-start;
    gap:4px;
    font-size:var(--header-font);
    font-weight:900;
    line-height:1.15;
    color:var(--white);
    background:transparent;
    border:none;
    box-shadow:none;
  }

  .header-line{
    display:block;
    width:100%;
    word-break:keep-all;
    overflow-wrap:normal;
  }

  .right-top{
    padding:6px 8px 0 8px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    text-align:center;
    background:transparent;
    border:none;
    box-shadow:none;
  }

  .date-line{
    font-size:var(--date-font);
    font-weight:900;
    line-height:1.08;
    margin-bottom:10px;
  }

  .time-line{
    font-size:var(--time-font);
    font-weight:950;
    line-height:1.02;
    letter-spacing:-2px;
    white-space:nowrap;
  }

  .time-line .accent{margin-right:14px;}

  .count-line{
    font-size:var(--count-font);
    font-weight:900;
    line-height:1.15;
    margin-top:10px;
  }

  .notice-card{
    display:flex;
    flex-direction:column;
    width:100%;
    margin:0;
  }

  .tab-bar{
    display:flex;
    align-items:center;
    gap:8px;
    padding:12px;
    border-bottom:1px solid rgba(0,0,0,0.06);
    background:#f8f8f9;
    flex-shrink:0;
  }

  .tab-btn{
    flex:1;
    min-width:0;
    border:none;
    background:transparent;
    color:#b9bfc8;
    font-size:var(--tab-font);
    font-weight:900;
    padding:14px 10px;
    border-radius:14px;
    cursor:pointer;
    transition:0.15s ease;
  }

  .tab-btn.active{
    background:var(--navy);
    color:var(--white);
  }

  .font-control{
    display:flex;
    align-items:center;
    gap:8px;
    padding:5px 12px;
    background:#eceff2;
    border-radius:22px;
    flex-shrink:0;
  }

  .size-btn{
    width:34px;
    height:34px;
    border-radius:50%;
    border:2px solid #ced4da;
    background:#fff;
    color:#495057;
    font-size:20px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }

  .size-input{
    width:58px;
    height:34px;
    text-align:center;
    font-size:18px;
    font-weight:900;
    border:2px solid #ced4da;
    border-radius:10px;
    padding:2px 6px;
    color:#495057;
    background:#fff;
    outline:none;
    appearance:auto;
    -webkit-appearance:auto;
    -moz-appearance:auto;
  }

  .size-input.always-spin::-webkit-outer-spin-button,
  .size-input.always-spin::-webkit-inner-spin-button{
    opacity:1;
    display:block;
    margin-left:2px;
  }

  .notice-content{
    flex:1;
    min-height:0;
    padding:34px 34px 30px 42px;
  }

  .notice-input{
    width:100%;
    height:100%;
    border:none;
    outline:none;
    resize:none;
    background:transparent;
    color:#333;
    font-size:64px;
    font-weight:900;
    line-height:1.30;
  }

  .meal-card{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    width:100%;
    margin:0;
    padding:18px 28px;
    text-align:center;
  }

  .meal-top{
    width:100%;
    min-height:64px;
    margin-bottom:14px;
  }

  .meal-title-wrap{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
  }

  .meal-title{
    display:inline-block;
    text-align:center;
    font-size:52px;
    font-weight:950;
    color:var(--navy);
    line-height:1;
    padding-bottom:8px;
    border-bottom:5px solid var(--yellow);
    min-width:260px;
  }

  .meal-font-control-wrap{
    position:absolute;
    top:18px;
    right:14px;
  }

  .meal-font-control{
    display:flex;
    align-items:center;
    gap:8px;
    padding:5px 12px;
    background:#e1e5ea;
    border-radius:22px;
    box-shadow:inset 0 1px 2px rgba(0,0,0,0.06);
  }

  .meal-list{
    width:100%;
    text-align:center;
    font-size:34px;
    font-weight:900;
    line-height:1.25;
    white-space:pre-line;
    color:#333;
  }

  .fullscreen-btn{
    position:fixed;
    right:16px;
    bottom:16px;
    width:52px;
    height:52px;
    border:none;
    border-radius:50%;
    background:rgba(255,255,255,0.92);
    box-shadow:0 8px 24px rgba(0,0,0,0.2);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#1f3563;
    z-index:30;
  }

  .fullscreen-btn svg{width:26px;height:26px;}

  @media (max-width:1500px){
    :root{
      --header-font:46px;
      --date-font:64px;
      --time-font:130px;
      --count-font:62px;
      --tab-font:20px;
    }

    .notice-input{font-size:50px;}
    .meal-title{font-size:42px;min-width:220px;}
    .meal-list{font-size:28px;}
  }
</style>
