<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>교실 대시보드</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    :root {
      --white: #ffffff; --yellow: #ffca1b;
      --glass-bg: rgba(255, 255, 255, 0.15); --glass-border: rgba(255, 255, 255, 0.25);
    }
    * { box-sizing: border-box; font-family: "Pretendard", sans-serif; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; color: var(--white); background: #0a2a63 url("wallpaper.jpg") center center / cover no-repeat fixed; }
    body { padding: 40px 50px; }
    .page { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto 1fr; gap: 30px; height: 100%; }
    .header-left { grid-column: 1; font-size: 30px; font-weight: 800; line-height: 1.3; }
    .header-right { grid-column: 2; text-align: right; font-size: 36px; font-weight: 800; }
    .glass-card { background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 30px; }
    
    /* 안내사항 영역 */
    .notice-section { grid-row: 2; display: flex; flex-direction: column; overflow: hidden; }
    .tab-container { display: flex; background: rgba(0,0,0,0.2); padding: 10px; gap: 5px; border-bottom: 1px solid var(--glass-border); }
    .tab-btn { flex: 1; padding: 15px; border: none; background: transparent; color: rgba(255,255,255,0.5); font-weight: 700; cursor: pointer; border-radius: 12px; font-size: 18px; transition: 0.3s; }
    .tab-btn.active { background: var(--white); color: #0a2a63; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    
    .notice-content { flex-grow: 1; padding: 30px; }
    .notice-input { width: 100%; height: 100%; background: transparent; border: none; outline: none; color: white; font-weight: 700; resize: none; line-height: 1.6; font-size: 34px; }

    /* 시간 표시 영역 */
    .main-right { grid-row: 2; display: flex; flex-direction: column; gap: 25px; }
    .time-wrap { text-align: right; }
    .status-line { font-size: 85px; font-weight: 900; letter-spacing: -2px; white-space: nowrap; line-height: 1.1; }
    .status-line .accent { color: var(--yellow); margin-right: 15px; }
    
    /* 급식 영역 */
    .meal-card { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
    .meal-title { font-size: 36px; font-weight: 900; margin-bottom: 15px; }
    .meal-list { font-size: 26px; font-weight: 700; line-height: 1.8; text-align: center; }
  </style>
</head>
<body>
  <div class="page">
    <div class="header-left" id="sheetData">데이터를 불러오는 중...</div>
    <div class="header-right" id="dateText"></div>

    <section class="glass-card notice-section">
      <div class="tab-container">
        <button class="tab-btn" id="btn-morning" onclick="selectTab('morning')">아침활동</button>
        <button class="tab-btn" id="btn-class" onclick="selectTab('class')">수업시간</button>
        <button class="tab-btn" id="btn-break" onclick="selectTab('break')">쉬는시간</button>
        <button class="tab-btn" id="btn-lunch" onclick="selectTab('lunch')">점심시간</button>
      </div>
      <div class="notice-content">
        <textarea id="noticeInput" class="notice-input" placeholder="여기에 내용을 입력하세요..."></textarea>
      </div>
    </section>

    <div class="main-right">
      <div class="time-wrap">
        <div class="status-line" id="statusLine"></div>
        <div id="countdownText" style="font-size: 28px; margin-top: 15px; font-weight: 700;"></div>
      </div>
      <section class="glass-card meal-card">
        <div class="meal-title">급식</div>
        <div id="mealList" class="meal-list">정보 로딩 중...</div>
      </section>
    </div>
  </div>

  <script>
    const MEMO_DEFAULTS = {
      morning: "• 핸드폰 전원 꺼서 가방에 넣기\n• 우체통과 알림장 확인하기\n• 자리 주변 정리하기\n• 아침독서하기",
      class: "• 가방 문 닫기\n• 연필 한 자루, 지우개 하나만 꺼내기\n• 바른 자세로 앉기\n• 경청하기",
      break: "• 책상 정리하기\n• 물 떠오기\n• 화장실 가기\n• 연필 깎기\n• 다음 시간 교과서 꺼내기",
      lunch: "" // 요일별로 동적 생성
    };

    const LUNCH_DAY = { 1: "교실놀이", 2: "바깥놀이", 3: "위클래스", 4: "바깥놀이", 5: "바깥놀이" };
    const LUNCH_COMMON = "\n• 책상 위 정리하기\n• 의자 넣기\n• 손 씻고 줄 서기";

    const PERIODS = [
      { name: "아침활동", start: "08:30", end: "08:59", type: "morning" },
      { name: "1교시", start: "09:00", end: "09:39", type: "class" },
      { name: "쉬는시간", start: "09:40", end: "09:49", type: "break" },
      { name: "2교시", start: "09:50", end: "10:29", type: "class" },
      { name: "쉬는시간", start: "10:30", box: "10:39", type: "break" },
      { name: "3교시", start: "10:40", end: "11:19", type: "class" },
      { name: "점심시간", start: "11:20", end: "12:19", type: "lunch" },
      { name: "4교시", start: "12:20", end: "12:59", type: "class" },
      { name: "5교시", start: "13:10", end: "13:49", type: "class" }
    ];

    let currentTab = "";
    let userEdits = JSON.parse(localStorage.getItem('userEdits') || '{}');

    // 탭 선택 및 렌더링 (클릭 시 작동)
    function selectTab(type) {
      currentTab = type;
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.id === `btn-${type}`);
      });

      const noticeInput = document.getElementById("noticeInput");
      if (userEdits[type] !== undefined) {
        noticeInput.value = userEdits[type];
      } else {
        if (type === 'lunch') {
          const day = new Date().getDay();
          noticeInput.value = "★ " + (LUNCH_DAY[day] || "자유활동") + LUNCH_COMMON;
        } else {
          noticeInput.value = MEMO_DEFAULTS[type] || "";
        }
      }
    }

    // 입력 내용 저장
    document.getElementById("noticeInput").addEventListener("input", (e) => {
      userEdits[currentTab] = e.target.value;
      localStorage.setItem('userEdits', JSON.stringify(userEdits));
    });

    function updateDashboard() {
      const now = new Date();
      const h = now.getHours();
      const m = now.getMinutes();
      const total = h * 60 + m;

      // 1. 날짜 업데이트
      const days = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];
      document.getElementById("dateText").textContent = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 ${days[now.getDay()]}`;

      // 2. 시간/교시 표시 (12시간제)
      const displayH = h % 12 || 12;
      const displayM = m < 10 ? '0' + m : m;

      const period = PERIODS.find(p => {
        const [sh, sm] = p.start.split(":").map(Number);
        const [eh, em] = p.end.split(":").map(Number);
        return total >= (sh * 60 + sm) && total <= (eh * 60 + em);
      });

      if (period) {
        const [eh, em] = (period.end || "00:00").split(":").map(Number);
        const remain = (eh * 60 + em) - total;
        // 3교시 11:10 처럼 시간만 나오게 조절 (교시명은 엑센트 영역에만)
        document.getElementById("statusLine").innerHTML = `<span class="accent">${period.name}</span>${displayH}시 ${displayM}분`;
        document.getElementById("countdownText").innerHTML = `종료까지 <span style="color:var(--yellow)">${remain}분</span> 남았습니다.`;
        
        // 1:50(830분) 전이면 자동 탭 전환
        if (total < 830 && currentTab !== period.type) selectTab(period.type);
      } else {
        document.getElementById("statusLine").innerHTML = `${displayH}시 ${displayM}분`;
        document.getElementById("countdownText").innerHTML = "즐거운 일과 시간입니다.";
        // 1:50 이후면 아침탭 고정
        if (total >= 830 && currentTab !== "morning") selectTab("morning");
      }
    }

    async function fetchMeal() {
      const mealEl = document.getElementById("mealList");
      if ([0, 6].includes(new Date().getDay())) {
        mealEl.innerText = "주말에는 급식이 없습니다. 🍱";
        return;
      }
      // API 호출 로직 생략 (실제 평일에 작동)
    }

    // 구글 시트 호출 (웹 게시 CSV 주소 확인 필수)
    async function fetchSheet() {
      const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSh0ND1N2lqnfgek8TE1vO0gztHKWsfcLif7tilCzh_Ibkau0i33CcKrfQGCu7n2rrRQDqYoCvsEIk/pub?gid=1958992156&single=true&output=csv";
      try {
        const res = await fetch(url);
        const data = await res.text();
        const rows = data.split('\n').map(r => r.split(','));
        document.getElementById("sheetData").innerHTML = `${rows[0][0]}<br>${rows[1][0]}`;
      } catch (e) { document.getElementById("sheetData").innerText = "스프레드시트 로드 오류"; }
    }

    // 초기 실행
    updateDashboard();
    fetchMeal();
    fetchSheet();
    setInterval(updateDashboard, 1000);
  </script>
</body>
</html>
